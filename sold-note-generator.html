<!DOCTYPE html>
<html lang="zh-HK">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sold Note PDF 填寫工具 | GovFlow</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: { navy: { DEFAULT: '#1B2A4A', light: '#2C3E6B' }, gold: { DEFAULT: '#C9A84C', light: '#E8D48B' } },
          fontFamily: { sans: ['"Noto Sans TC"', 'system-ui', '-apple-system', 'sans-serif'] }
        }
      }
    }
  </script>
</head>
<body class="bg-gray-100 font-sans">

  <nav class="bg-navy text-white sticky top-0 z-50">
    <div class="max-w-4xl mx-auto px-4 flex items-center justify-between h-14">
      <a href="./" class="flex items-center gap-2 font-bold text-lg"><span class="text-gold">◆</span> GovFlow</a>
      <span class="text-sm text-gray-400">Sold Note 填寫工具</span>
    </div>
  </nav>

  <div class="max-w-4xl mx-auto px-4 py-6">

    <!-- Instructions -->
    <div class="bg-gradient-to-r from-amber-50 to-yellow-50 border border-amber-200 rounded-xl p-4 mb-6 text-center text-sm text-gray-700">
      ✏️ 直接喺 PDF 嘅橫線上打字 → 一鍵生成已填好嘅 PDF
    </div>

    <!-- ═══════ PDF WITH OVERLAY INPUTS ═══════ -->
    <div id="pdf-capture" class="bg-white shadow-xl border border-gray-300 mx-auto overflow-hidden rounded-lg" style="max-width:800px; font-family:'Noto Sans TC',sans-serif;">
      <div class="relative w-full" id="pdf-container">

        <!-- The actual PDF as background -->
        <img id="pdf-bg" src="assets/demo/sold-note-preview.png" alt="Sold Note" class="w-full block" />

        <!-- Input fields overlay - positioned over each underscore line -->
        <!-- SOLD NOTE section (top half) -->
        <input id="f1" class="pdf-field" style="position:absolute; top:15.5%; left:48%; width:48%; height:2.5%; border:none; background:transparent; font-size:clamp(9px,1.2vw,13px); color:#000; padding:0 4px; outline:none;" value="Siu Yan Li" />
        <input id="f2" class="pdf-field" style="position:absolute; top:19%; left:48%; width:48%; height:2.5%; border:none; background:transparent; font-size:clamp(9px,1.2vw,13px); color:#000; padding:0 4px; outline:none;" value="北角英皇道 250 號北角城中心 8/F 806 室" />
        <input id="f3" class="pdf-field" style="position:absolute; top:22.5%; left:48%; width:48%; height:2.5%; border:none; background:transparent; font-size:clamp(9px,1.2vw,13px); color:#000; padding:0 4px; outline:none;" value="Business Owner" />
        <input id="f4" class="pdf-field" style="position:absolute; top:26%; left:48%; width:48%; height:2.5%; border:none; background:transparent; font-size:clamp(9px,1.2vw,13px); color:#000; padding:0 4px; outline:none;" value="ABC 貿易有限公司" />
        <input id="f5" class="pdf-field" style="position:absolute; top:29.5%; left:48%; width:48%; height:2.5%; border:none; background:transparent; font-size:clamp(9px,1.2vw,13px); color:#000; padding:0 4px; outline:none;" value="5,000" />
        <input id="f6" class="pdf-field" style="position:absolute; top:33%; left:48%; width:48%; height:2.5%; border:none; background:transparent; font-size:clamp(9px,1.2vw,13px); color:#000; padding:0 4px; outline:none;" value="HK$ 50,000.00" />
        <input id="f7" class="pdf-field" style="position:absolute; top:36.5%; left:48%; width:48%; height:2.5%; border:none; background:transparent; font-size:clamp(9px,1.2vw,13px); color:#000; padding:0 4px; outline:none;" value="2026-06-01" />
        <input id="f8" class="pdf-field" style="position:absolute; top:40%; left:48%; width:48%; height:2.5%; border:none; background:transparent; font-size:clamp(9px,1.2vw,13px); color:#000; padding:0 4px; outline:none;" placeholder="親筆簽署" />

        <!-- BOUGHT NOTE section (bottom half) -->
        <input id="f9" class="pdf-field" style="position:absolute; top:57%; left:48%; width:48%; height:2.5%; border:none; background:transparent; font-size:clamp(9px,1.2vw,13px); color:#000; padding:0 4px; outline:none;" value="Tai Ming Chan" />
        <input id="f10" class="pdf-field" style="position:absolute; top:60.5%; left:48%; width:48%; height:2.5%; border:none; background:transparent; font-size:clamp(9px,1.2vw,13px); color:#000; padding:0 4px; outline:none;" value="觀塘開源道 72 號溢財中心 12/F 1208 室" />
        <input id="f11" class="pdf-field" style="position:absolute; top:64%; left:48%; width:48%; height:2.5%; border:none; background:transparent; font-size:clamp(9px,1.2vw,13px); color:#000; padding:0 4px; outline:none;" value="Business Owner" />
        <input id="f12" class="pdf-field" style="position:absolute; top:67.5%; left:48%; width:48%; height:2.5%; border:none; background:transparent; font-size:clamp(9px,1.2vw,13px); color:#000; padding:0 4px; outline:none;" value="5,000" />
        <input id="f13" class="pdf-field" style="position:absolute; top:71%; left:48%; width:48%; height:2.5%; border:none; background:transparent; font-size:clamp(9px,1.2vw,13px); color:#000; padding:0 4px; outline:none;" value="HK$ 50,000.00" />
        <input id="f14" class="pdf-field" style="position:absolute; top:74.5%; left:48%; width:48%; height:2.5%; border:none; background:transparent; font-size:clamp(9px,1.2vw,13px); color:#000; padding:0 4px; outline:none;" value="2026-06-01" />
        <input id="f15" class="pdf-field" style="position:absolute; top:78%; left:48%; width:48%; height:2.5%; border:none; background:transparent; font-size:clamp(9px,1.2vw,13px); color:#000; padding:0 4px; outline:none;" placeholder="親筆簽署" />

        <!-- Focus highlight (appears on click) -->
        <style>
          .pdf-field:focus { background: rgba(201,168,76,0.15); border-radius: 2px; }
          .pdf-field:hover { background: rgba(201,168,76,0.08); border-radius: 2px; }
        </style>
      </div>
    </div>

    <!-- Actions -->
    <div class="max-w-[800px] mx-auto mt-6">
      <button onclick="generatePDF()" id="genBtn"
              class="w-full bg-navy text-white font-bold py-4 px-6 rounded-xl hover:bg-navy-light transition shadow-lg text-lg flex items-center justify-center gap-2">
        📄 一鍵生成 PDF
      </button>
      <p id="status" class="text-center text-sm mt-3 hidden"></p>
    </div>
  </div>

  <script>
    async function generatePDF() {
      const btn = document.getElementById('genBtn');
      const status = document.getElementById('status');
      btn.disabled = true;
      btn.innerHTML = '⏳ 生成中…';
      status.className = 'text-center text-sm mt-3';
      status.classList.remove('hidden');

      try {
        const { jsPDF } = window.jspdf;
        const capture = document.getElementById('pdf-capture');

        // Temporarily remove focus/background for clean capture
        document.querySelectorAll('.pdf-field').forEach(el => el.style.background = 'transparent');

        const canvas = await html2canvas(capture, {
          scale: 2,
          useCORS: true,
          backgroundColor: '#ffffff',
          logging: false,
          onclone: (doc) => {
            doc.querySelectorAll('.pdf-field').forEach(el => el.style.background = 'transparent');
          }
        });

        const imgData = canvas.toDataURL('image/jpeg', 0.92);
        const pdfW = 210;
        const pdfH = (canvas.height / canvas.width) * pdfW;

        const doc = new jsPDF('p', 'mm', 'a4');
        doc.addImage(imgData, 'JPEG', 0, 0, pdfW, Math.min(pdfH, 297));

        if (pdfH > 297) {
          doc.addPage();
          doc.addImage(imgData, 'JPEG', 0, -297, pdfW, pdfH);
        }

        doc.save('Sold_Note_Filled.pdf');
        btn.innerHTML = '✅ PDF 已下載！';
        status.textContent = '✅ 成功！請打印簽署。';
        status.className = 'text-center text-sm mt-3 text-green-600';
        setTimeout(() => {
          btn.innerHTML = '📄 一鍵生成 PDF';
          btn.disabled = false;
        }, 2000);

      } catch(e) {
        console.error(e);
        btn.innerHTML = '📄 一鍵生成 PDF';
        btn.disabled = false;
        status.textContent = '❌ ' + e.message;
        status.className = 'text-center text-sm mt-3 text-red-500';
      }
    }
  </script>

  <footer class="bg-navy text-white py-8 mt-12">
    <div class="max-w-4xl mx-auto px-4 text-center text-xs text-gray-400">
      <p>⚠️ 僅供參考，並不構成法律意見。填寫後請打印簽署。</p>
      <p class="mt-1">© GovFlow</p>
    </div>
  </footer>
</body>
</html>
