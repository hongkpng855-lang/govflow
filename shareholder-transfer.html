<!DOCTYPE html>
<html lang="zh-HK">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>香港有限公司股份轉讓完整指南 | GovFlow</title>
  <meta name="description" content="真實範例、可下載模板、避免補交。由經歷者整理，7步完成股份轉讓。" />
  <meta property="og:title" content="香港有限公司股份轉讓完整指南 | GovFlow" />
  <meta property="og:description" content="真實範例、可下載模板、避免補交。由經歷者整理，7步完成股份轉讓。" />
  <meta property="og:type" content="website" />
  <meta property="og:locale" content="zh_HK" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="assets/css/style.css" />
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <script defer src="assets/js/app.js"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            navy: { DEFAULT: '#1B2A4A', light: '#2C3E6B' },
            gold: { DEFAULT: '#C9A84C', light: '#E8D48B' },
          },
          fontFamily: {
            sans: ['"Noto Sans TC"', 'system-ui', '-apple-system', 'sans-serif'],
          }
        }
      }
    }
  </script>
</head>
<body x-data="{
  processData: null,
  totalSteps: 7,
  freeSteps: 2,
  isLoading: true,
  error: null,
  selectedDoc: null,
  showOverlay: false,

  async init() {
    try {
      const r = await fetch('processes.json');
      if (!r.ok) throw new Error('HTTP '+r.status);
      const j = await r.json();
      this.processData = j;
      this.totalSteps = j.totalSteps;
      this.freeSteps = j.freeSteps;
    } catch(e) {
      this.error = '無法載入內容，請重新整理頁面';
      console.error('Load error:', e);
    } finally {
      this.isLoading = false;
    }
  },

  get steps() { return this.processData?.steps || []; },
  get isPaid() { return localStorage.getItem('govflow_unlocked') === 'true'; },

  openDoc(doc) {
    this.selectedDoc = doc;
    this.showOverlay = true;
    document.body.style.overflow = 'hidden';
  },

  closeDoc() {
    this.showOverlay = false;
    this.selectedDoc = null;
    document.body.style.overflow = '';
  },

  goToPayment() {
    window.open('https://1714457598663.gumroad.com/l/wkjykk', '_blank');
  }
}">

  <!-- ═══════════════ Sticky Nav (Simple) ═══════════════ -->
  <div class="bg-navy text-white shadow-lg" x-init="init()">
    <div class="max-w-6xl mx-auto px-4">
      <div class="flex items-center justify-between h-14">
        <div class="flex items-center gap-3 min-w-0">
          <a href="./" class="text-gold shrink-0 hover:text-gold-light transition">←</a>
          <span class="text-xs sm:text-sm font-semibold truncate text-gold">股份轉讓完整指南</span>
        </div>
        <span class="text-xs bg-gold/20 text-gold px-2 py-1 rounded-full whitespace-nowrap">
          HK$<span x-text="processData?.price || 149"></span>
        </span>
      </div>
    </div>
  </div>

  <!-- ═══════════════ All Steps (Scrollable) ═══════════════ -->
  <div class="max-w-3xl mx-auto px-4 sm:px-6 lg:px-8 py-6 sm:py-8">

    <!-- Intro -->
    <div class="mb-10">
      <h1 class="text-2xl sm:text-3xl font-bold gov-heading mb-3">香港有限公司股份轉讓完整指南</h1>
      <p class="text-gray-500 text-sm">一次性付費 HK$149 · 7 個步驟 · 15+ 份模板 · 永久存取</p>
    </div>

    <!-- Loading -->
    <div x-show="isLoading" class="text-center py-20">
      <div class="w-8 h-8 border-4 border-gold border-t-transparent rounded-full animate-spin mx-auto mb-4"></div>
      <p class="text-gray-500 text-sm">載入中…</p>
    </div>

    <!-- Error -->
    <div x-show="error" class="bg-red-50 border border-red-200 rounded-xl p-6 text-center mb-8">
      <p class="text-red-700" x-text="error"></p>
    </div>

    <!-- All Steps -->
    <div x-show="!isLoading && !error" class="space-y-12">
      <template x-for="(s, idx) in steps" :key="s.stepNumber">
        <div class="scroll-mt-20">

          <!-- ════ Free Step (Unlocked) ════ -->
          <div x-show="s.stepNumber <= freeSteps || isPaid">
            <!-- Header -->
            <div class="flex items-center gap-3 mb-4">
              <span class="w-10 h-10 rounded-full bg-gold text-navy flex items-center justify-center font-bold shrink-0">
                <span x-text="s.stepNumber"></span>
              </span>
              <div>
                <h2 class="text-xl sm:text-2xl font-bold gov-heading" x-text="s.title"></h2>
                <span class="text-xs text-gold font-semibold" x-show="s.isFree">🆓 免費步驟</span>
                <span class="text-xs text-green-600 font-semibold" x-show="!s.isFree">✅ 已解鎖</span>
              </div>
            </div>
            <p class="text-gray-500 mb-4" x-text="s.summary"></p>

            <!-- Details -->
            <div class="bg-white rounded-xl border border-gray-200 p-5 sm:p-6 mb-6">
              <div class="prose prose-sm max-w-none text-gray-700 leading-relaxed whitespace-pre-line" x-text="s.details"></div>
            </div>

            <!-- Documents -->
            <div x-show="s.documents && s.documents.length > 0" class="mb-6">
              <h3 class="font-semibold text-navy text-base mb-3">📋 所需文件</h3>
              <div class="grid sm:grid-cols-2 gap-3">
                <template x-for="(doc, dIdx) in s.documents" :key="dIdx">
                  <div class="doc-card cursor-pointer p-4" @click="openDoc(doc)">
                    <div class="flex items-start gap-3">
                      <span class="text-xl mt-0.5">📄</span>
                      <div class="min-w-0">
                        <p class="font-semibold text-sm text-navy" x-text="doc.name"></p>
                        <p class="text-xs text-gray-500 mt-1" x-text="doc.description"></p>
                        <p class="text-xs text-gold font-medium mt-2">👆 按此查看範例</p>
                      </div>
                    </div>
                  </div>
                </template>
              </div>
            </div>

            <!-- Rejection Risks -->
            <div x-show="s.rejectionRisks && s.rejectionRisks.length > 0" class="risk-callout mb-6">
              <h4 class="font-semibold text-warning mb-2 flex items-center gap-2 text-sm">
                ⚠️ 常見錯誤導致補交
              </h4>
              <ul class="text-sm text-gray-700 space-y-1">
                <template x-for="(risk, rIdx) in s.rejectionRisks" :key="rIdx">
                  <li class="flex items-start gap-2">
                    <span class="text-warning mt-0.5 shrink-0">•</span>
                    <span x-text="risk"></span>
                  </li>
                </template>
              </ul>
            </div>
          </div>

          <!-- ════ Locked Step (Paid) ════ -->
          <div x-show="s.stepNumber > freeSteps && !isPaid" class="relative">
            <div class="absolute inset-0 bg-white/70 backdrop-blur-[2px] rounded-xl z-10"></div>
            <div class="relative">
              <!-- Header -->
              <div class="flex items-center gap-3 mb-4">
                <span class="w-10 h-10 rounded-full bg-gray-200 text-gray-400 flex items-center justify-center font-bold shrink-0">
                  <span x-text="s.stepNumber"></span>
                </span>
                <div>
                  <h2 class="text-xl sm:text-2xl font-bold text-gray-400" x-text="s.title"></h2>
                  <span class="text-xs text-gray-400">🔒 已鎖定</span>
                </div>
              </div>
              <p class="text-gray-400 mb-4" x-text="s.summary"></p>

              <!-- Preview placeholder -->
              <div class="bg-gray-50 rounded-xl border border-gray-200 p-5 mb-4 opacity-40">
                <div class="space-y-2">
                  <div class="h-3 skeleton w-3/4"></div>
                  <div class="h-3 skeleton w-full"></div>
                  <div class="h-3 skeleton w-2/3"></div>
                </div>
              </div>
            </div>

            <!-- Lock CTA (outside blur) -->
            <div class="relative z-20 -mt-20 pt-12 pb-6 text-center">
              <div class="bg-navy rounded-xl p-6 sm:p-8 text-white">
                <div class="text-3xl mb-3">🔒</div>
                <h3 class="text-lg font-bold mb-2">解鎖後可查看此步驟</h3>
                <div class="flex flex-wrap justify-center gap-x-6 gap-y-1 text-sm text-gray-300 mb-4">
                  <span>✅ 完整步驟內容</span>
                  <span>✅ 範例圖片</span>
                  <span>✅ 可編輯模板</span>
                </div>
                <button @click="goToPayment()" class="btn-gov btn-gov-buy text-base btn-gov-pulse">
                  🔓 解鎖完整指南 HK$<span x-text="processData?.price || 149"></span>
                </button>
              </div>
            </div>
          </div>

          <!-- Divider between steps -->
          <div x-show="idx < steps.length - 1" class="border-b border-gray-100 my-8"></div>

        </div>
      </template>

      <!-- Bottom CTA -->
      <div x-show="!isPaid" class="text-center pb-8">
        <div class="bg-gradient-to-br from-navy to-navy-light rounded-xl p-8 text-white">
          <div class="text-4xl mb-3">🔓</div>
          <h3 class="text-xl font-bold mb-2">準備好一次過搞掂？</h3>
          <p class="text-gray-300 text-sm mb-6 max-w-md mx-auto">
            解鎖全部 7 個步驟、15+ 份文件模板、真實填寫範例
          </p>
          <button @click="goToPayment()" class="btn-gov btn-gov-buy text-lg btn-gov-pulse">
            🔓 即解鎖 HK$<span x-text="processData?.price || 149"></span>
          </button>
          <p class="text-xs text-gray-400 mt-4">一次性付款，永久存取 · 14 日退款保證</p>
        </div>
      </div>

    </div>
  </div>

  <!-- ═══════════════ Bottom Sticky CTA (Mobile) ═══════════════ -->
  <div x-show="!isPaid"
       class="sm:hidden fixed bottom-0 left-0 right-0 bg-white border-t border-gray-200 p-3 z-40 shadow-lg">
    <button @click="goToPayment()" class="btn-gov btn-gov-buy w-full justify-center text-sm btn-gov-pulse">
      🔓 解鎖完整指南 — HK$<span x-text="processData?.price || 149"></span>
    </button>
  </div>

  <!-- ═══════════════ Bottom CTA (Sticky Mobile) ═══════════════ -->
  <div x-show="!isPaid"
       class="sm:hidden fixed bottom-0 left-0 right-0 bg-white border-t border-gray-200 p-3 z-40 shadow-lg">
    <button @click="goToPayment()" class="btn-gov btn-gov-buy w-full justify-center text-sm btn-gov-pulse">
      🔓 解鎖完整指南 + 所有模板 — HK$<span x-text="processData?.price || 149"></span>
    </button>
  </div>

  <!-- ═══════════════ Document Overlay ═══════════════ -->
  <div x-show="showOverlay" class="doc-overlay" @click.self="closeDoc()">
    <div class="doc-overlay-content p-6">
      <div class="flex items-center justify-between mb-4">
        <h3 class="font-bold text-lg text-navy" x-text="selectedDoc?.name"></h3>
        <button @click="closeDoc()" class="text-gray-400 hover:text-gray-600 text-xl leading-none">&times;</button>
      </div>

      <!-- Demo Image Placeholder -->
      <template x-if="selectedDoc?.demoImage">
        <div class="bg-gray-50 rounded-xl p-4 mb-4 text-center">
          <img :src="selectedDoc.demoImage"
               :alt="selectedDoc.name + ' 填寫範例'"
               class="max-w-full h-auto mx-auto rounded-lg shadow-sm border border-gray-200"
               loading="lazy" />
          <p class="text-xs text-gray-400 mt-2">👆 填寫範例（對住呢個填就唔會錯）</p>
        </div>
      </template>

      <!-- Description -->
      <p class="text-sm text-gray-600 mb-4" x-text="selectedDoc?.description"></p>

      <!-- Common Mistakes -->
      <template x-if="selectedDoc?.commonMistakes && selectedDoc.commonMistakes.length > 0">
        <div class="risk-callout mb-4">
          <h4 class="font-semibold text-warning text-sm mb-2">⚠️ 常見錯誤</h4>
          <ul class="text-sm text-gray-700 space-y-1">
            <template x-for="(mistake, idx) in selectedDoc.commonMistakes" :key="idx">
              <li class="flex items-start gap-2">
                <span class="text-warning">•</span>
                <span x-text="mistake"></span>
              </li>
            </template>
          </ul>
        </div>
      </template>

      <!-- Download -->
      <template x-if="selectedDoc?.templateFile">
        <a :href="selectedDoc.templateFile"
           class="btn-gov btn-gov-success text-sm w-full justify-center"
           @click="closeDoc()">
          📥 下載可編輯模板
        </a>
      </template>
      <template x-if="!selectedDoc?.templateFile">
        <p class="text-xs text-gray-400 text-center">（此文件暫無模板，創辦人將稍後提供）</p>
      </template>
    </div>
  </div>

  <!-- ═══════════════ Footer ═══════════════ -->
  <footer class="gov-footer py-8 sm:py-12">
    <div class="max-w-6xl mx-auto px-4 sm:px-6 lg:px-8">
      <div class="flex flex-col sm:flex-row items-center justify-between gap-4 mb-6">
        <div class="flex items-center gap-2 text-white font-bold">
          <span class="text-gold">◆</span> GovFlow
        </div>
        <a href="./" class="text-sm text-gray-400 hover:text-gold transition">← 返回首頁</a>
      </div>
      <div class="border-t border-gray-700 pt-6 text-center text-xs text-gray-500">
        <p>⚠️ 免責聲明：本網站提供嘅內容僅供參考，並不構成法律意見。</p>
        <p class="mt-1">© 2025 GovFlow. All rights reserved.</p>
        <p class="mt-2 opacity-40">v1.0.0 · d0166f7</p>
      </div>
    </div>
  </footer>

  <!-- Bottom spacer for mobile sticky CTA -->
  <div class="h-20 sm:h-0"></div>

</body>
</html>
