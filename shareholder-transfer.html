<!DOCTYPE html>
<html lang="zh-HK">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>香港有限公司股份轉讓完整指南 | GovFlow</title>
  <meta name="description" content="真實範例、可下載模板、避免補交。由經歷者整理，7步完成股份轉讓。" />
  <meta property="og:title" content="香港有限公司股份轉讓完整指南 | GovFlow" />
  <meta property="og:description" content="真實範例、可下載模板、避免補交。由經歷者整理，7步完成股份轉讓。" />
  <meta property="og:type" content="website" />
  <meta property="og:locale" content="zh_HK" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="assets/css/style.css" />
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <script defer src="assets/js/app.js"></script>
  <script>
    window.__govflow_stores = null;
    document.addEventListener('alpine:init', () => {
      Alpine.store('process', {
        data: null, currentStep: 1, totalSteps: 7, freeSteps: 2, isLoading: true, error: null,
        async load(pid) {
          this.isLoading = true; this.error = null;
          try {
            const r = await fetch('processes.json');
            if (!r.ok) throw new Error('HTTP '+r.status);
            const j = await r.json();
            this.data = j; this.totalSteps = j.totalSteps; this.freeSteps = j.freeSteps;
          } catch(e) {
            this.error = '無法載入內容，請重新整理頁面';
            console.error('Load error:', e);
          } finally { this.isLoading = false; }
        },
        get steps() { return this.data?.steps || []; },
        get currentStepData() { return this.steps.find(s => s.stepNumber === this.currentStep) || null; },
        get isPaid() { return localStorage.getItem('govflow_unlocked') === 'true'; },
        get unlockedSteps() { return this.steps.filter(s => s.isFree || this.isPaid); },
        isStepAccessible(sn) { return sn <= this.freeSteps || this.isPaid; },
        goToStep(sn) { if (sn >= 1 && sn <= this.totalSteps) { this.currentStep = sn; document.getElementById('step-content')?.scrollIntoView({ behavior: 'smooth', block: 'start' }); } },
        unlockAll() { localStorage.setItem('govflow_unlocked', 'true'); }
      });
      Alpine.data('docOverlay', () => ({
        open: false, doc: null,
        show(d) { this.doc = d; this.open = true; document.body.style.overflow = 'hidden'; },
        close() { this.open = false; this.doc = null; document.body.style.overflow = ''; }
      }));
      Alpine.data('payment', () => ({
        price: 149, currency: 'HKD',
        get displayPrice() { return 'HK$'+this.price; },
        checkout() { window.open('https://1714457598663.gumroad.com/l/wkjykk', '_blank'); }
      }));
    });
  </script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            navy: { DEFAULT: '#1B2A4A', light: '#2C3E6B' },
            gold: { DEFAULT: '#C9A84C', light: '#E8D48B' },
          },
          fontFamily: {
            sans: ['"Noto Sans TC"', 'system-ui', '-apple-system', 'sans-serif'],
          }
        }
      }
    }
  </script>
</head>
<body x-data="{
  process: Alpine.$store.process,
  docOverlay: Alpine.$data(document.querySelector('[x-data]')?.__x_scope || {}),
  activeMobileTab: 1,
  selectedDoc: null,
  showOverlay: false,

  init() {
    this.process.load('shareholder-transfer');
  },

  get step() {
    return this.process.currentStepData;
  },

  get progressPercent() {
    return ((this.process.currentStep) / this.process.totalSteps) * 100;
  },

  get isAccessible() {
    const s = this.process.currentStep;
    return s <= this.process.freeSteps || this.process.isPaid;
  },

  goToStep(n) {
    if (n >= 1 && n <= this.process.totalSteps) {
      this.process.currentStep = n;
      this.activeMobileTab = n;
    }
  },

  openDoc(doc) {
    this.selectedDoc = doc;
    this.showOverlay = true;
    document.body.style.overflow = 'hidden';
  },

  closeDoc() {
    this.showOverlay = false;
    this.selectedDoc = null;
    document.body.style.overflow = '';
  },

  goToPayment() {
    window.open('https://1714457598663.gumroad.com/l/wkjykk', '_blank');
  }
}">

  <!-- ═══════════════ Sticky Header ═══════════════ -->
  <div class="sticky-header bg-navy text-white shadow-lg" x-init="init()">
    <div class="max-w-6xl mx-auto px-4">
      <div class="flex items-center justify-between h-14 sm:h-16">
        <div class="flex items-center gap-3 min-w-0">
          <a href="./" class="text-gold shrink-0 hover:text-gold-light transition">←</a>
          <h1 class="text-sm sm:text-base font-semibold truncate">
            香港有限公司股份轉讓完整指南
          </h1>
        </div>
        <div class="flex items-center gap-3 shrink-0">
          <span class="text-xs text-gray-300 hidden sm:inline">
            步驟 <span x-text="process.currentStep"></span>/<span x-text="process.totalSteps"></span>
          </span>
          <span class="text-xs bg-gold/20 text-gold px-2 py-1 rounded-full whitespace-nowrap">
            HK$<span x-text="process.data?.price || 149"></span>
          </span>
        </div>
      </div>
      <!-- Progress bar -->
      <div class="progress-bar mb-2">
        <div class="progress-fill" :style="'width: ' + progressPercent + '%'"></div>
      </div>
    </div>
  </div>

  <!-- ═══════════════ Mobile Step Tabs ═══════════════ -->
  <div class="sm:hidden bg-white border-b border-gray-200 step-tabs">
    <div class="flex gap-1 p-2" x-show="process.steps.length > 0">
      <template x-for="s in process.steps" :key="s.stepNumber">
        <button
          class="step-nav-item flex items-center gap-1 px-3 py-2 rounded-lg text-xs font-medium whitespace-nowrap transition"
          :class="{
            'active bg-navy text-white': process.currentStep === s.stepNumber,
            'opacity-50': !process.isStepAccessible(s.stepNumber) && process.currentStep !== s.stepNumber,
            'border border-gold': process.currentStep === s.stepNumber
          }"
          @click="goToStep(s.stepNumber)"
        >
          <span x-text="s.stepNumber"></span>
          <span class="hidden" :class="{'inline': process.currentStep === s.stepNumber}">
            <span x-text="s.title.substring(0, 8) + '…'"></span>
          </span>
          <span x-show="!process.isStepAccessible(s.stepNumber)" class="text-gray-400">🔒</span>
        </button>
      </template>
    </div>
  </div>

  <!-- ═══════════════ Main Content ═══════════════ -->
  <div class="max-w-6xl mx-auto px-4 sm:px-6 lg:px-8 py-6 sm:py-8">
    <div class="flex gap-8">
      
      <!-- Desktop Sidebar -->
      <aside class="hidden sm:block w-64 shrink-0">
        <nav class="sticky top-32 space-y-1">
          <div class="text-xs font-semibold text-gray-400 uppercase tracking-wider mb-3 px-3">
            步驟導航
          </div>
          <template x-for="s in process.steps" :key="s.stepNumber">
            <button
              class="step-nav-item w-full text-left px-3 py-2.5 rounded-lg text-sm flex items-center gap-2 transition"
              :class="{
                'active bg-navy text-white font-semibold': process.currentStep === s.stepNumber,
                'hover:bg-gray-100 text-gray-700': process.currentStep !== s.stepNumber && !s.isFree && !process.isPaid,
                'opacity-50': !process.isStepAccessible(s.stepNumber) && process.currentStep !== s.stepNumber
              }"
              @click="goToStep(s.stepNumber)"
            >
              <span
                class="w-6 h-6 rounded-full flex items-center justify-center text-xs font-bold shrink-0"
                :class="{
                  'bg-gold text-navy': process.currentStep === s.stepNumber,
                  'bg-gray-200 text-gray-500': process.currentStep !== s.stepNumber && process.isStepAccessible(s.stepNumber),
                  'bg-gray-100 text-gray-400': !process.isStepAccessible(s.stepNumber)
                }"
                x-text="s.stepNumber"
              ></span>
              <span class="truncate" x-text="s.title.substring(0, 16) + (s.title.length > 16 ? '…' : '')"></span>
              <span x-show="!process.isStepAccessible(s.stepNumber)" class="ml-auto text-gray-400">🔒</span>
              <span x-show="s.isFree" class="ml-auto text-xs bg-green-100 text-green-700 px-1.5 py-0.5 rounded">免費</span>
            </button>
          </template>

          <!-- Sidebar CTA for locked users -->
          <div x-show="!process.isPaid" class="mt-6 bg-navy/5 rounded-xl p-4 border border-gold/30">
            <p class="text-xs text-gray-600 mb-3">
              解鎖全部 7 個步驟 + 所有範例及模板
            </p>
            <button @click="goToPayment()" class="btn-gov btn-gov-buy text-sm w-full justify-center py-2 btn-gov-pulse">
              🔓 解鎖完整指南 HK$<span x-text="process.data?.price || 149"></span>
            </button>
          </div>
        </nav>
      </aside>

      <!-- ═══════════════ Content Area ═══════════════ -->
      <main id="step-content" class="flex-1 min-w-0">

        <!-- Loading -->
        <div x-show="process.isLoading" class="text-center py-20">
          <div class="w-8 h-8 border-4 border-gold border-t-transparent rounded-full animate-spin mx-auto mb-4"></div>
          <p class="text-gray-500 text-sm">載入中…</p>
        </div>

        <!-- Error -->
        <div x-show="process.error" class="bg-red-50 border border-red-200 rounded-xl p-6 text-center">
          <p class="text-red-700" x-text="process.error"></p>
        </div>

        <!-- Step Content -->
        <template x-for="s in process.steps" :key="s.stepNumber">
          <div x-show="!process.isLoading && !process.error && process.currentStep === s.stepNumber"
               class="fade-in-up">

            <!-- Unlocked Step -->
            <div x-show="process.isStepAccessible(s.stepNumber)">
              <!-- Step Header -->
              <div class="mb-8">
                <div class="flex items-center gap-3 mb-2">
                  <span class="w-10 h-10 rounded-full bg-gold text-navy flex items-center justify-center font-bold text-lg">
                    <span x-text="s.stepNumber"></span>
                  </span>
                  <span class="text-sm text-gold font-semibold" x-show="s.isFree">免費步驟</span>
                  <span class="text-sm text-green-600 font-semibold" x-show="!s.isFree">已解鎖 ✅</span>
                </div>
                <h2 class="text-2xl sm:text-3xl font-bold gov-heading mb-2" x-text="s.title"></h2>
                <p class="text-gray-500" x-text="s.summary"></p>
              </div>

              <!-- Details -->
              <div class="bg-white rounded-xl border border-gray-200 p-6 mb-8">
                <h3 class="font-semibold text-navy text-lg mb-3">詳細說明</h3>
                <p class="text-gray-700 leading-relaxed" x-text="s.details"></p>
              </div>

              <!-- Documents -->
              <div x-show="s.documents && s.documents.length > 0" class="mb-8">
                <h3 class="font-semibold text-navy text-lg mb-4">所需文件</h3>
                <div class="grid sm:grid-cols-2 gap-3">
                  <template x-for="(doc, idx) in s.documents" :key="idx">
                    <div class="doc-card cursor-pointer" @click="openDoc(doc)">
                      <div class="flex items-start gap-3">
                        <span class="text-xl mt-0.5">📄</span>
                        <div class="min-w-0">
                          <p class="font-semibold text-sm text-navy" x-text="doc.name"></p>
                          <p class="text-xs text-gray-500 mt-0.5" x-text="doc.description"></p>
                          <div class="flex items-center gap-2 mt-2">
                            <span class="text-xs text-gold font-medium">👆 按此查看範例</span>
                          </div>
                        </div>
                      </div>
                    </div>
                  </template>
                </div>
              </div>

              <!-- Rejection Risks -->
              <div x-show="s.rejectionRisks && s.rejectionRisks.length > 0" class="risk-callout mb-8">
                <h4 class="font-semibold text-warning mb-2 flex items-center gap-2">
                  ⚠️ 常見錯誤導致補交
                </h4>
                <ul class="text-sm text-gray-700 space-y-1">
                  <template x-for="(risk, idx) in s.rejectionRisks" :key="idx">
                    <li class="flex items-start gap-2">
                      <span class="text-warning mt-0.5">•</span>
                      <span x-text="risk"></span>
                    </li>
                  </template>
                </ul>
              </div>
            </div>

            <!-- Locked Step -->
            <div x-show="!process.isStepAccessible(s.stepNumber)" class="lock-overlay">
              <div class="mb-8">
                <div class="flex items-center gap-3 mb-2">
                  <span class="w-10 h-10 rounded-full bg-gray-200 text-gray-400 flex items-center justify-center font-bold text-lg">
                    <span x-text="s.stepNumber"></span>
                  </span>
                  <span class="text-sm text-gray-400 font-semibold">🔒 已鎖定</span>
                </div>
                <h2 class="text-2xl sm:text-3xl font-bold gov-heading mb-2" x-text="s.title"></h2>
                <p class="text-gray-500" x-text="s.summary"></p>
              </div>

              <!-- Preview (blurred) -->
              <div class="bg-white rounded-xl border border-gray-200 p-6 mb-6 opacity-40 select-none">
                <div class="space-y-3">
                  <div class="h-4 skeleton w-3/4"></div>
                  <div class="h-4 skeleton w-full"></div>
                  <div class="h-4 skeleton w-5/6"></div>
                  <div class="h-4 skeleton w-2/3"></div>
                </div>
              </div>

              <!-- Lock CTA -->
              <div class="lock-content bg-gradient-to-br from-navy to-navy-light rounded-xl p-6 sm:p-8 text-white text-center mb-8">
                <div class="text-4xl mb-4">🔒</div>
                <h3 class="text-xl font-bold mb-2">此步驟已鎖定</h3>
                <p class="text-gray-300 mb-6 max-w-md mx-auto text-sm">
                  解鎖完整指南即可查看全部 <span x-text="process.totalSteps"></span> 個步驟嘅詳細內容、範例圖片及可編輯模板
                </p>
                <div class="flex flex-col items-center gap-2 mb-4">
                  <div class="flex items-center gap-2 text-sm">
                    <span>✅</span> 7 個完整步驟
                  </div>
                  <div class="flex items-center gap-2 text-sm">
                    <span>✅</span> 15+ 份文件模板
                  </div>
                  <div class="flex items-center gap-2 text-sm">
                    <span>✅</span> 真實填寫範例
                  </div>
                  <div class="flex items-center gap-2 text-sm">
                    <span>✅</span> 14 日退款保證
                  </div>
                </div>
                <button @click="goToPayment()" class="btn-gov btn-gov-buy text-lg w-full sm:w-auto btn-gov-pulse">
                  解鎖完整指南 — 限時 HK$<span x-text="process.data?.price || 149"></span>
                </button>
              </div>
            </div>

            <!-- Step Navigation Buttons -->
            <div class="flex justify-between items-center mt-8 mb-12">
              <button
                x-show="s.stepNumber > 1"
                @click="goToStep(s.stepNumber - 1)"
                class="btn-gov btn-gov-dark text-sm"
              >
                ← 上一步
              </button>
              <div x-show="s.stepNumber === 1"></div>
              <button
                x-show="s.stepNumber < process.totalSteps"
                @click="goToStep(s.stepNumber + 1)"
                class="btn-gov btn-gov-dark text-sm"
              >
                下一步 →
              </button>
            </div>

          </div>
        </template>

      </main>
    </div>
  </div>

  <!-- ═══════════════ Bottom CTA (Sticky Mobile) ═══════════════ -->
  <div x-show="!process.isPaid"
       class="sm:hidden fixed bottom-0 left-0 right-0 bg-white border-t border-gray-200 p-3 z-40 shadow-lg">
    <button @click="goToPayment()" class="btn-gov btn-gov-buy w-full justify-center text-sm btn-gov-pulse">
      🔓 解鎖完整指南 + 所有模板 — HK$<span x-text="process.data?.price || 149"></span>
    </button>
  </div>

  <!-- ═══════════════ Document Overlay ═══════════════ -->
  <div x-show="showOverlay" class="doc-overlay" @click.self="closeDoc()">
    <div class="doc-overlay-content p-6">
      <div class="flex items-center justify-between mb-4">
        <h3 class="font-bold text-lg text-navy" x-text="selectedDoc?.name"></h3>
        <button @click="closeDoc()" class="text-gray-400 hover:text-gray-600 text-xl leading-none">&times;</button>
      </div>

      <!-- Demo Image Placeholder -->
      <template x-if="selectedDoc?.demoImage">
        <div class="bg-gray-100 rounded-xl p-6 mb-4 text-center">
          <div class="aspect-video bg-gray-200 rounded-lg flex items-center justify-center mb-3">
            <div>
              <p class="text-gray-400 text-sm">[範例圖片]</p>
              <p class="text-gray-500 text-xs mt-1" x-text="selectedDoc.name + ' 正確填寫示範'"></p>
            </div>
          </div>
          <p class="text-xs text-gray-400 italic">* 創辦人將替換為真實掃描範例</p>
        </div>
      </template>

      <!-- Description -->
      <p class="text-sm text-gray-600 mb-4" x-text="selectedDoc?.description"></p>

      <!-- Common Mistakes -->
      <template x-if="selectedDoc?.commonMistakes && selectedDoc.commonMistakes.length > 0">
        <div class="risk-callout mb-4">
          <h4 class="font-semibold text-warning text-sm mb-2">⚠️ 常見錯誤</h4>
          <ul class="text-sm text-gray-700 space-y-1">
            <template x-for="(mistake, idx) in selectedDoc.commonMistakes" :key="idx">
              <li class="flex items-start gap-2">
                <span class="text-warning">•</span>
                <span x-text="mistake"></span>
              </li>
            </template>
          </ul>
        </div>
      </template>

      <!-- Download -->
      <template x-if="selectedDoc?.templateFile">
        <a :href="selectedDoc.templateFile"
           class="btn-gov btn-gov-success text-sm w-full justify-center"
           @click="closeDoc()">
          📥 下載可編輯模板
        </a>
      </template>
      <template x-if="!selectedDoc?.templateFile">
        <p class="text-xs text-gray-400 text-center">（此文件暫無模板，創辦人將稍後提供）</p>
      </template>
    </div>
  </div>

  <!-- ═══════════════ Footer ═══════════════ -->
  <footer class="gov-footer py-8 sm:py-12">
    <div class="max-w-6xl mx-auto px-4 sm:px-6 lg:px-8">
      <div class="flex flex-col sm:flex-row items-center justify-between gap-4 mb-6">
        <div class="flex items-center gap-2 text-white font-bold">
          <span class="text-gold">◆</span> GovFlow
        </div>
        <a href="./" class="text-sm text-gray-400 hover:text-gold transition">← 返回首頁</a>
      </div>
      <div class="border-t border-gray-700 pt-6 text-center text-xs text-gray-500">
        <p>⚠️ 免責聲明：本網站提供嘅內容僅供參考，並不構成法律意見。</p>
        <p class="mt-1">© 2025 GovFlow. All rights reserved.</p>
      </div>
    </div>
  </footer>

  <!-- Bottom spacer for mobile sticky CTA -->
  <div class="h-20 sm:h-0"></div>

</body>
</html>
