<!DOCTYPE html>
<html lang="zh-HK">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>香港有限公司股份轉讓完整指南 | GovFlow</title>
  <meta name="description" content="真實範例、可下載模板、避免補交。由經歷者整理，5份文件搞掂股份轉讓。" />
  <meta property="og:title" content="香港有限公司股份轉讓完整指南 | GovFlow" />
  <meta property="og:description" content="真實範例、可下載模板、避免補交。由經歷者整理，5份文件搞掂股份轉讓。" />
  <meta property="og:type" content="website" />
  <meta property="og:locale" content="zh_HK" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="assets/css/style.css" />
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <script defer src="assets/js/app.js"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            navy: { DEFAULT: '#1B2A4A', light: '#2C3E6B' },
            gold: { DEFAULT: '#C9A84C', light: '#E8D48B' },
          },
          fontFamily: {
            sans: ['"Noto Sans TC"', 'system-ui', '-apple-system', 'sans-serif'],
          }
        }
      }
    }
  </script>
</head>
<body x-data="{
  processData: null,
  currentStep: 1,
  totalSteps: 7,
  freeSteps: 2,
  isLoading: true,
  error: null,
  activeMobileTab: 1,
  selectedDoc: null,
  showOverlay: false,

  async init() {
    try {
      const r = await fetch('processes.json');
      if (!r.ok) throw new Error('HTTP '+r.status);
      const j = await r.json();
      this.processData = j;
      this.totalSteps = j.totalSteps;
      this.freeSteps = j.freeSteps;
    } catch(e) {
      this.error = '無法載入內容，請重新整理頁面';
      console.error('Load error:', e);
    } finally {
      this.isLoading = false;
    }
  },

  get steps() { return this.processData?.steps || []; },
  get currentStepData() { return this.steps.find(s => s.stepNumber === this.currentStep) || null; },
  get isPaid() { return localStorage.getItem('govflow_unlocked') === 'true'; },
  get progressPercent() { return (this.currentStep / this.totalSteps) * 100; },
  get isAccessible() { return this.currentStep <= this.freeSteps || this.isPaid; },
  isStepAccessible(sn) { return sn <= this.freeSteps || this.isPaid; },

  goToStep(n) {
    if (n >= 1 && n <= this.totalSteps) {
      this.currentStep = n;
      this.activeMobileTab = n;
    }
  },

  openDoc(doc) {
    this.selectedDoc = doc;
    this.showOverlay = true;
    document.body.style.overflow = 'hidden';
  },

  closeDoc() {
    this.showOverlay = false;
    this.selectedDoc = null;
    document.body.style.overflow = '';
  },


  goToPayment() {
    window.open('https://1714457598663.gumroad.com/l/wkjykk', '_blank');
  }
}">

  <!-- ═══════════════ Sticky Header ═══════════════ -->
  <div class="sticky-header bg-navy text-white shadow-lg" x-init="init()">
    <div class="max-w-6xl mx-auto px-4">
      <div class="flex items-center justify-between h-14 sm:h-16">
        <a href="./" class="flex items-center gap-2.5 shrink-0"><img src="assets/images/govflow-logo.svg" alt="GovFlow" class="w-7 h-7" /><span class="text-white font-bold text-lg tracking-tight">GovFlow</span></a>
        <div class="flex items-center gap-2 min-w-0 ml-3 pl-3 border-l border-white/20">
          <a href="./" class="text-gold shrink-0 hover:text-gold-light transition text-sm sm:text-base">←</a>
          <h1 class="text-sm sm:text-base font-semibold truncate text-white/90">
            香港有限公司股份轉讓完整指南
          </h1>
        </div>
        <div class="flex items-center gap-3 shrink-0">
          <span class="text-xs text-gray-300 hidden sm:inline truncate max-w-[200px]">
            <span x-text="(currentStepData?.title.split('（')[0] || currentStepData?.title || '').substring(0, 20)"></span>
          </span>
          <span class="text-xs bg-gold/20 text-gold px-2 py-1 rounded-full whitespace-nowrap">
            HK$<span x-text="processData?.price || 149"></span>
          </span>
        </div>
      </div>
      <!-- Progress bar -->
      <div class="progress-bar mb-2">
        <div class="progress-fill" :style="'width: ' + progressPercent + '%'"></div>
      </div>
    </div>
  </div>

  <!-- ═══════════════ Mobile Step Scroll ═══════════════ -->
  <div class="sm:hidden bg-white border-b border-gray-200 step-tabs shadow-sm">
    <div class="flex gap-1 p-2" x-show="steps.length > 0">
      <template x-for="s in steps" :key="s.stepNumber">
        <button
          class="step-nav-item flex flex-col items-center gap-0 px-3 py-1.5 rounded-lg text-[11px] font-medium leading-tight transition min-w-[52px]"
          :class="{
            'active bg-navy text-white shadow-md': currentStep === s.stepNumber,
            'bg-gray-50 text-gray-500 border border-gray-200': currentStep !== s.stepNumber,
            'opacity-60': !isStepAccessible(s.stepNumber) && currentStep !== s.stepNumber
          }"
          @click="goToStep(s.stepNumber)"
        >
          <span class="font-bold text-sm" x-text="s.stepNumber"></span>
          <span class="text-[10px] text-center leading-[1.1]" x-text="(s.title.split('（')[0] || s.title).substring(0, 6)"></span>
          <span x-show="!isStepAccessible(s.stepNumber)" class="text-[10px]">🔒</span>
          <span x-show="s.isFree" class="text-[10px]">🆓</span>
        </button>
      </template>
    </div>
  </div>

  <!-- ═══════════════ Main Content ═══════════════ -->
  <div class="max-w-6xl mx-auto px-4 sm:px-6 lg:px-8 py-6 sm:py-8">
    <div class="flex gap-8">
      
      <!-- Desktop Sidebar -->
      <aside class="hidden sm:block w-64 shrink-0">
        <nav class="sticky top-32">
          <div class="text-xs font-semibold text-gray-400 uppercase tracking-wider mb-3 px-4">
            全部步驟
          </div>
          <div class="space-y-0.5">
          <template x-for="s in steps" :key="s.stepNumber">
            <button
              class="step-nav-item w-full text-left px-4 py-2.5 rounded-xl text-sm flex items-center gap-3 transition border border-transparent"
              :class="{
                'bg-navy text-white shadow-sm border-gold/30': currentStep === s.stepNumber,
                'hover:bg-gray-50 hover:border-gray-200': currentStep !== s.stepNumber
              }"
              @click="goToStep(s.stepNumber)"
            >
              <span
                class="w-7 h-7 rounded-full flex items-center justify-center text-xs font-bold shrink-0 transition"
                :class="{
                  'bg-gold text-navy': currentStep === s.stepNumber,
                  'bg-gray-200 text-gray-500': currentStep !== s.stepNumber && isStepAccessible(s.stepNumber),
                  'bg-gray-100 text-gray-400': !isStepAccessible(s.stepNumber)
                }"
                x-text="s.stepNumber"
              ></span>
              <div class="min-w-0 flex-1">
                <span class="block text-xs font-medium leading-snug" :class="{'text-gray-500': !isStepAccessible(s.stepNumber) && currentStep !== s.stepNumber}" x-text="s.title.split('（')[0] || s.title"></span>
                <span class="block text-[10px] mt-0.5" :class="{'text-gray-300': currentStep === s.stepNumber, 'text-gray-400': currentStep !== s.stepNumber}" x-show="s.isFree">🆓 免費步驟</span>
                <span class="block text-[10px] mt-0.5" :class="{'text-gray-300': currentStep === s.stepNumber, 'text-gray-400': currentStep !== s.stepNumber}" x-show="!s.isFree && !isPaid">🔒 解鎖後可查看</span>
              </div>
            </button>
          </template>
          </div>

          <!-- Sidebar CTA for locked users -->
          <div x-show="!isPaid" class="mt-6 bg-navy/5 rounded-xl p-4 border border-gold/30">
            <p class="text-xs text-gray-600 mb-3">
              解鎖全部 <span x-text="totalSteps"></span> 個步驟 + 所有範例及模板
            </p>
            <button @click="goToPayment()" class="btn-gov btn-gov-buy text-sm w-full justify-center py-2 btn-gov-pulse">
              🔓 解鎖完整指南 HK$<span x-text="processData?.price || 149"></span>
            </button>
          </div>
        </nav>
      </aside>

      <!-- ═══════════════ Content Area ═══════════════ -->
      <main id="step-content" class="flex-1 min-w-0">

        <!-- Loading -->
        <div x-show="isLoading" class="text-center py-20">
          <div class="w-8 h-8 border-4 border-gold border-t-transparent rounded-full animate-spin mx-auto mb-4"></div>
          <p class="text-gray-500 text-sm">載入中…</p>
        </div>

        <!-- Error -->
        <div x-show="error" class="bg-red-50 border border-red-200 rounded-xl p-6 text-center">
          <p class="text-red-700" x-text="error"></p>
        </div>

        <!-- Price Comparison Banner -->
        <div class="bg-gradient-to-r from-amber-50 to-yellow-50 border border-amber-200 rounded-xl p-4 mb-6 text-center" x-show="!isLoading && !error && processData?.priceComparison">
          <p class="text-sm text-gray-700">
            💰 <span x-text="processData.priceComparison.benchmarkLabel"></span> <span class="line-through text-gray-400">$<span x-text="processData.priceComparison.benchmark + '+'"></span></span>
            <span class="mx-2 text-amber-400">→</span>
            <span class="text-gold font-bold text-base">GovFlow 只需 HK$<span x-text="processData.price"></span></span>
          </p>
        </div>

        <!-- Step Content -->
        <template x-for="s in steps" :key="s.stepNumber">
          <div x-show="!isLoading && !error && currentStep === s.stepNumber"
               class="fade-in-up">

            <!-- Unlocked Step -->
            <div x-show="isStepAccessible(s.stepNumber)">
              <!-- Step Header -->
              <div class="mb-8">
                <div class="flex items-center gap-3 mb-2">
                  <span class="w-10 h-10 rounded-full bg-gold text-navy flex items-center justify-center font-bold text-lg">
                    <span x-text="s.stepNumber"></span>
                  </span>
                  <span class="text-sm text-gold font-semibold" x-show="s.isFree">免費步驟</span>
                  <span class="text-sm text-green-600 font-semibold" x-show="!s.isFree">已解鎖 ✅</span>
                </div>
                <h2 class="text-2xl sm:text-3xl font-bold gov-heading mb-2" x-text="s.title"></h2>
                <p class="text-gray-500" x-text="s.summary"></p>
              </div>

              <!-- Details -->
              <div class="bg-white rounded-xl border border-gray-200 p-6 mb-8">
                <h3 class="font-semibold text-navy text-lg mb-3">詳細說明</h3>
                <div class="text-gray-700 leading-relaxed whitespace-pre-line text-sm" x-text="s.details"></div>
              </div>

              <!-- Documents (範例預覽 + PDF 生成器整合) -->
              <div x-show="s.documents && s.documents.length > 0" class="mb-8">
                <h3 class="font-semibold text-navy text-lg mb-4">所需文件</h3>
                <div class="grid sm:grid-cols-2 gap-4">
                  <template x-for="(doc, idx) in s.documents" :key="idx">
                    <template x-if="s.stepNumber === 1">
                      <a href="sold-note-generator.html"
                         class="doc-card bg-white border-2 border-gold/30 rounded-xl overflow-hidden hover:border-gold/60 transition block cursor-pointer shadow-sm hover:shadow-md">
                        <!-- Demo 預覽圖 -->
                        <template x-if="doc.demoImage">
                          <div class="h-32 sm:h-40 bg-gray-100 overflow-hidden relative">
                            <img :src="doc.demoImage" :alt="doc.name" class="w-full h-full object-cover" @error="$event.target.closest('div').innerHTML='<div class=flex items-center justify-center h-full text-gray-400 text-sm>🖼️ 範例圖片</div>'" />
                            <div class="absolute top-2 right-2 bg-gold text-navy text-xs font-bold px-2 py-0.5 rounded-full shadow">互動工具</div>
                          </div>
                        </template>
                        <!-- 下方內容 -->
                        <div class="p-4">
                          <p class="font-bold text-sm text-navy" x-text="doc.name"></p>
                          <p class="text-xs text-gray-500 mt-1 leading-relaxed" x-text="doc.description"></p>
                          <div class="flex items-center gap-2 mt-3">
                            <span class="inline-flex items-center gap-1.5 text-xs font-bold bg-gold text-navy px-4 py-2 rounded-lg hover:bg-gold-light transition shadow-sm">
                              🚀 填寫 + 生成 PDF
                            </span>
                          </div>
                        </div>
                      </a>
                    </template>
                    <template x-if="s.stepNumber !== 1">
                      <div class="doc-card bg-white border border-gray-200 rounded-xl p-4 hover:border-navy/30 transition cursor-pointer shadow-sm hover:shadow" @click="openDoc(doc)">
                        <div class="flex items-start gap-3">
                          <span class="text-2xl mt-0.5 shrink-0">📄</span>
                          <div class="min-w-0 flex-1">
                            <p class="font-semibold text-sm text-navy" x-text="doc.name"></p>
                            <p class="text-xs text-gray-500 mt-1" x-text="doc.description"></p>
                            <div class="flex items-center gap-2 mt-3">
                              <span class="inline-flex items-center gap-1 text-xs font-medium bg-navy text-white px-3 py-1.5 rounded-lg hover:bg-navy-light transition">
                                👁️ 檢視範例 PDF
                              </span>
                            </div>
                          </div>
                        </div>
                      </div>
                    </template>
                  </template>
                </div>
              </div>

              <!-- Rejection Risks -->
              <div x-show="s.rejectionRisks && s.rejectionRisks.length > 0" class="risk-callout mb-8">
                <h4 class="font-semibold text-warning mb-2 flex items-center gap-2">
                  ⚠️ 常見錯誤導致補交
                </h4>
                <ul class="text-sm text-gray-700 space-y-1">
                  <template x-for="(risk, idx) in s.rejectionRisks" :key="idx">
                    <li class="flex items-start gap-2">
                      <span class="text-warning mt-0.5">•</span>
                      <span x-text="risk"></span>
                    </li>
                  </template>
                </ul>
              </div>
            </div>

            <!-- Locked Step -->
            <div x-show="!isStepAccessible(s.stepNumber)" class="lock-overlay">
              <div class="mb-8">
                <div class="flex items-center gap-3 mb-2">
                  <span class="w-10 h-10 rounded-full bg-gray-200 text-gray-400 flex items-center justify-center font-bold text-lg">
                    <span x-text="s.stepNumber"></span>
                  </span>
                  <span class="text-sm text-gray-400 font-semibold">🔒 已鎖定</span>
                </div>
                <h2 class="text-2xl sm:text-3xl font-bold gov-heading mb-2" x-text="s.title"></h2>
                <p class="text-gray-500" x-text="s.summary"></p>
              </div>

              <!-- Preview (blurred) -->
              <div class="bg-white rounded-xl border border-gray-200 p-6 mb-6 opacity-40 select-none">
                <div class="space-y-3">
                  <div class="h-4 skeleton w-3/4"></div>
                  <div class="h-4 skeleton w-full"></div>
                  <div class="h-4 skeleton w-5/6"></div>
                  <div class="h-4 skeleton w-2/3"></div>
                </div>
              </div>

              <!-- Lock CTA -->
              <div class="lock-content bg-gradient-to-br from-navy to-navy-light rounded-xl p-6 sm:p-8 text-white text-center mb-8">
                <div class="text-4xl mb-4">🔒</div>
                <h3 class="text-xl font-bold mb-2">此步驟已鎖定</h3>
                <p class="text-gray-300 mb-6 max-w-md mx-auto text-sm">
                  解鎖完整指南即可查看全部 <span x-text="totalSteps"></span> 個步驟嘅詳細內容、範例圖片及可編輯模板
                </p>
                <div class="flex flex-col items-center gap-2 mb-4">
                  <div class="flex items-center gap-2 text-sm">
                    <span>✅</span> <span x-text="totalSteps"></span> 個完整步驟
                  </div>
                  <div class="flex items-center gap-2 text-sm">
                    <span>✅</span> 總共 <span x-text="totalSteps"></span> 份文件模板
                  </div>
                  <div class="flex items-center gap-2 text-sm">
                    <span>✅</span> 真實填寫範例
                  </div>
                  <div class="flex items-center gap-2 text-sm">
                    <span>✅</span> 14 日退款保證
                  </div>
                </div>
                <button @click="goToPayment()" class="btn-gov btn-gov-buy text-lg w-full sm:w-auto btn-gov-pulse">
                  解鎖完整指南 — 限時 HK$<span x-text="processData?.price || 149"></span>
                </button>
              </div>
            </div>

            <!-- Step Navigation Buttons -->
            <div class="flex justify-between items-center mt-8 mb-12">
              <button
                x-show="s.stepNumber > 1"
                @click="goToStep(s.stepNumber - 1)"
                class="btn-gov btn-gov-dark text-sm"
              >
                ← 上一步
              </button>
              <div x-show="s.stepNumber === 1"></div>
              <button
                x-show="s.stepNumber < totalSteps"
                @click="goToStep(s.stepNumber + 1)"
                class="btn-gov btn-gov-dark text-sm"
              >
                下一步 →
              </button>
            </div>

          </div>
        </template>

      </main>
    </div>
  </div>

  <!-- ═══════════════ Bottom CTA (Sticky Mobile) ═══════════════ -->
  <div x-show="!isPaid"
       class="sm:hidden fixed bottom-0 left-0 right-0 bg-white border-t border-gray-200 p-3 z-40 shadow-lg">
    <button @click="goToPayment()" class="btn-gov btn-gov-buy w-full justify-center text-sm btn-gov-pulse">
      🔓 解鎖完整指南 + 所有模板 — HK$<span x-text="processData?.price || 149"></span>
    </button>
  </div>

  <!-- ═══════════════ Document Overlay (範例 + 模板整合) ═══════════════ -->
  <div x-show="showOverlay" class="fixed inset-0 bg-black/60 z-50 flex items-start justify-center p-4 overflow-y-auto" @click.self="closeDoc()">
    <div class="bg-white rounded-xl max-w-2xl w-full shadow-2xl overflow-hidden mt-4 sm:mt-8 mb-8">
      
      <!-- Header -->
      <div class="flex items-center justify-between px-6 py-4 border-b border-gray-100">
        <h3 class="font-bold text-navy text-base sm:text-lg truncate" x-text="selectedDoc?.name"></h3>
        <button @click="closeDoc()" class="text-gray-400 hover:text-gray-600 text-2xl leading-none shrink-0 ml-2">&times;</button>
      </div>

      <div class="p-6">

        <!-- Demo Image (主要) -->
        <template x-if="selectedDoc?.demoImage">
          <div class="bg-gray-50 rounded-xl p-4 mb-5 border border-gray-200">
            <div class="relative">
              <img :src="selectedDoc.demoImage" :alt="selectedDoc.name + ' 填寫範例'"
                   class="w-full rounded-lg shadow-sm"
                   @error="$event.target.closest('div').querySelector('.img-fallback').classList.remove('hidden')"
              />
              <div class="img-fallback hidden text-center py-12 text-gray-400 bg-gray-100 rounded-lg">
                <p class="text-lg mb-2">🖼️</p>
                <p>[範例圖片載入失敗]</p>
              </div>
            </div>
            <p class="text-xs text-gray-400 mt-2 text-center">👆 按右鍵 → 另存圖片即可儲存範例</p>
          </div>
        </template>

        <!-- Description + 常見錯誤 -->
        <div class="mb-5">
          <p class="text-sm text-gray-600 mb-3" x-text="selectedDoc?.description"></p>
          <template x-if="selectedDoc?.commonMistakes && selectedDoc.commonMistakes.length > 0">
            <div class="bg-red-50 border border-red-100 rounded-xl p-4">
              <h4 class="font-semibold text-red-600 text-sm mb-2 flex items-center gap-1">⚠️ 常見錯誤</h4>
              <ul class="text-sm text-gray-700 space-y-1.5">
                <template x-for="(mistake, idx) in selectedDoc.commonMistakes" :key="idx">
                  <li class="flex items-start gap-2">
                    <span class="text-red-400 mt-0.5">•</span>
                    <span x-text="mistake"></span>
                  </li>
                </template>
              </ul>
            </div>
          </template>
        </div>

        <!-- Step 1：前往生成器；其他 Step：下載模板 -->
        <template x-if="currentStep === 1">
          <a href="sold-note-generator.html"
             class="w-full flex items-center justify-center gap-2 bg-gold text-navy font-bold py-4 px-6 rounded-xl hover:bg-gold-light transition shadow text-base"
             @click="closeDoc()">
            🚀 前往 Sold Note PDF 生成器 — 填資料、一鍵生成
          </a>
        </template>
        <template x-if="currentStep !== 1 && selectedDoc?.templateFile">
          <a :href="selectedDoc.templateFile"
             class="w-full flex items-center justify-center gap-2 bg-navy text-white font-bold py-3.5 px-6 rounded-xl hover:bg-navy-light transition shadow text-sm"
             @click="closeDoc()">
            📥 下載可編輯模板（Word / PDF）
          </a>
        </template>
        <template x-if="currentStep !== 1 && !selectedDoc?.templateFile">
          <div class="bg-gray-50 rounded-xl py-4 text-center">
            <p class="text-xs text-gray-400">（此文件暫無可編輯模板，創辦人將稍後提供）</p>
          </div>
        </template>

      </div>
    </div>
  </div>

  <!-- ═══════════════ Footer ═══════════════ -->
  <footer class="gov-footer py-8 sm:py-12">
    <div class="max-w-6xl mx-auto px-4 sm:px-6 lg:px-8">
      <div class="flex flex-col sm:flex-row items-center justify-between gap-4 mb-6">
        <div class="flex items-center gap-2 text-white font-bold">
          <img src="assets/images/govflow-logo.svg" alt="GovFlow" class="w-5 h-5 inline-block" /><span class="ml-1.5 font-semibold">GovFlow</span>
        </div>
        <a href="./" class="text-sm text-gray-400 hover:text-gold transition">← 返回首頁</a>
      </div>
      <div class="border-t border-gray-700 pt-6 text-center text-xs text-gray-500">
