<svg xmlns="http://www.w3.org/2000/svg" width="400" height="500" viewBox="0 0 400 500">
  <rect width="400" height="500" fill="#f8f6f0" rx="8"/>
  <rect x="20" y="20" width="360" height="460" rx="6" fill="none" stroke="#C9A84C" stroke-width="1.5" stroke-dasharray="5,5"/>
  <text x="200" y="60" text-anchor="middle" font-family="system-ui" font-size="13" font-weight="700" fill="#1B2A4A">董事辭職信</text>
  <line x1="60" y1="80" x2="340" y2="80" stroke="#C9A84C" stroke-width="1"/>
  <text x="60" y="115" font-family="system-ui" font-size="11" fill="#666">致：ABC Limited 董事會</text>
  <text x="60" y="150" font-family="system-ui" font-size="11" fill="#555">本人 [姓名]，現正式辭去 ABC Limited 董事一職。</text>
  <text x="60" y="180" font-family="system-ui" font-size="11" fill="#555">辭職生效日期：[日期]</text>
  <text x="60" y="215" font-family="system-ui" font-size="11" fill="#555">本人確認已按照公司組織章程細則嘅規定</text>
  <text x="60" y="240" font-family="system-ui" font-size="11" fill="#555">發出所需嘅辭職通知。</text>
  <text x="60" y="290" font-family="system-ui" font-size="11" fill="#666">辭職董事簽署：</text>
  <line x1="60" y1="320" x2="250" y2="320" stroke="#333" stroke-width="1"/>
  <text x="60" y="340" font-family="system-ui" font-size="10" fill="#999">簽署</text>
  <text x="60" y="380" font-family="system-ui" font-size="11" fill="#666">見證人簽署：</text>
  <line x1="60" y1="410" x2="250" y2="410" stroke="#333" stroke-width="1"/>
  <text x="60" y="430" font-family="system-ui" font-size="10" fill="#999">見證人 · 獨立第三方</text>
</svg>
