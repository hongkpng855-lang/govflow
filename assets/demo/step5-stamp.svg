<svg xmlns="http://www.w3.org/2000/svg" width="800" height="450" viewBox="0 0 800 450">
  <rect width="800" height="450" fill="#f8f9fa"/>
  <rect x="40" y="30" width="720" height="390" rx="8" fill="#fff" stroke="#dee2e6" stroke-width="1"/>
  <text x="400" y="75" text-anchor="middle" font-family="sans-serif" font-size="18" font-weight="bold" fill="#1B2A4A">印花稅計算表 — 填寫範例</text>
  <line x1="100" y1="95" x2="700" y2="95" stroke="#C9A84C" stroke-width="2"/>
  <text x="100" y="140" font-family="sans-serif" font-size="13" font-weight="bold" fill="#1B2A4A">轉讓股份:</text>
  <text x="250" y="140" font-family="sans-serif" font-size="13" fill="#212529">100 股普通股</text>
  <text x="100" y="175" font-family="sans-serif" font-size="13" font-weight="bold" fill="#1B2A4A">每股作價:</text>
  <text x="250" y="175" font-family="sans-serif" font-size="13" fill="#212529">HK$10.00</text>
  <text x="100" y="210" font-family="sans-serif" font-size="13" font-weight="bold" fill="#1B2A4A">總代價:</text>
  <text x="250" y="210" font-family="sans-serif" font-size="13" fill="#212529">HK$1,000</text>
  <text x="100" y="245" font-family="sans-serif" font-size="13" font-weight="bold" fill="#1B2A4A">印花稅率:</text>
  <text x="250" y="245" font-family="sans-serif" font-size="13" fill="#212529">0.2%（轉讓書）</text>
  <text x="100" y="280" font-family="sans-serif" font-size="13" font-weight="bold" fill="#1B2A4A">應繳稅額:</text>
  <rect x="250" y="265" width="120" height="28" rx="4" fill="#fff4e6" stroke="#e67700" stroke-width="2"/>
  <text x="260" y="284" font-family="sans-serif" font-size="13" font-weight="bold" fill="#e67700">HK$2.00</text>
  <text x="400" y="390" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#868e96">📌 作價寫得太低會被質疑係送贈，稅局計法唔同</text>
</svg>
