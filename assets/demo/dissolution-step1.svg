<svg xmlns="http://www.w3.org/2000/svg" width="400" height="500" viewBox="0 0 400 500">
  <rect width="400" height="500" fill="#f8f6f0" rx="8"/>
  <rect x="20" y="20" width="360" height="460" rx="6" fill="none" stroke="#C9A84C" stroke-width="1.5" stroke-dasharray="5,5"/>
  <text x="200" y="70" text-anchor="middle" font-family="system-ui" font-size="14" font-weight="700" fill="#1B2A4A">董事會決議 — 撤銷公司註冊</text>
  <line x1="60" y1="90" x2="340" y2="90" stroke="#C9A84C" stroke-width="1"/>
  <text x="60" y="120" font-family="system-ui" font-size="11" fill="#666">公司名稱：ABC Limited</text>
  <text x="60" y="145" font-family="system-ui" font-size="11" fill="#666">決議日期：2026 年 月 日</text>
  <text x="60" y="175" font-family="system-ui" font-size="11" fill="#333" font-weight="600">決議事項：</text>
  <text x="60" y="200" font-family="system-ui" font-size="11" fill="#555">經董事會決議通過，本公司將申請撤銷註冊。</text>
  <text x="60" y="225" font-family="system-ui" font-size="11" fill="#555">所有成員已書面同意撤銷註冊。</text>
  <text x="60" y="260" font-family="system-ui" font-size="11" fill="#333" font-weight="600">簽署：</text>
  <line x1="60" y1="290" x2="250" y2="290" stroke="#333" stroke-width="1"/>
  <text x="60" y="310" font-family="system-ui" font-size="10" fill="#999">董事簽署</text>
  <line x1="60" y1="345" x2="250" y2="345" stroke="#333" stroke-width="1"/>
  <text x="60" y="365" font-family="system-ui" font-size="10" fill="#999">見證人簽署</text>
  <rect x="60" y="400" width="280" height="45" rx="4" fill="#1B2A4A" opacity="0.1"/>
  <text x="200" y="425" text-anchor="middle" font-family="system-ui" font-size="10" fill="#1B2A4A">📋 範例文件 · 實際使用時請按公司情況修改</text>
</svg>
