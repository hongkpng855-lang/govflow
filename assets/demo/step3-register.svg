  <text x="380" y="135" font-family="sans-serif" font-size="13" font-weight="bold" fill="#1B2A4A">轉讓日期</text>
  <text x="530" y="135" font-family="sans-serif" font-size="13" font-weight="bold" fill="#1B2A4A">備註</text>
  <line x1="100" y1="145" x2="700" y2="145" stroke="#dee2e6" stroke-width="1"/>
  <text x="100" y="175" font-family="sans-serif" font-size="13" fill="#212529">ABC Trading Limited</text>
  <text x="280" y="175" font-family="sans-serif" font-size="13" fill="#212529">0</text>
  <text x="380" y="175" font-family="sans-serif" font-size="13" fill="#212529">2025-06-01</text>
