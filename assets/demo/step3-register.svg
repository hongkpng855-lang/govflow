  <text x="380" y="205" font-family="sans-serif" font-size="13" fill="#212529">2025-06-01</text>
  <text x="530" y="205" font-family="sans-serif" font-size="13" fill="#2b8a3e">新股東</text>
  <text x="400" y="300" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#495057">（更新後持股狀況）</text>
  <text x="400" y="420" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#868e96">📌 轉讓後必須盡快更新，官方有要求</text>
