<svg xmlns="http://www.w3.org/2000/svg" width="800" height="550" viewBox="0 0 800 550">
  <rect width="800" height="550" fill="#f8f9fa"/>
  <rect x="40" y="30" width="720" height="490" rx="8" fill="#fff" stroke="#dee2e6" stroke-width="1"/>
  <text x="400" y="75" text-anchor="middle" font-family="sans-serif" font-size="18" font-weight="bold" fill="#1B2A4A">董事會書面決議 — 填寫範例</text>
  <line x1="100" y1="95" x2="700" y2="95" stroke="#C9A84C" stroke-width="2"/>
  <text x="100" y="130" font-family="sans-serif" font-size="14" font-weight="bold" fill="#1B2A4A">ABC Trading Limited</text>
  <text x="100" y="155" font-family="sans-serif" font-size="13" fill="#495057">董事會書面決議 (2025-06-01)</text>
  <text x="100" y="190" font-family="sans-serif" font-size="13" fill="#495057">決議內容：</text>
  <text x="120" y="215" font-family="sans-serif" font-size="13" fill="#212529">1. 批准將 100 股普通股由 ABC Trading Limited 轉讓予 John Doe</text>
  <text x="120" y="240" font-family="sans-serif" font-size="13" fill="#212529">2. 同意更新公司股東名冊以及映上述變更</text>
  <text x="120" y="265" font-family="sans-serif" font-size="13" fill="#212529">3. 授權陳大明（公司秘書）處理所有相關文件提交事宜</text>
  <rect x="100" y="300" width="580" height="40" rx="4" fill="#fff4e6" stroke="#e67700" stroke-width="1"/>
  <text x="110" y="325" font-family="sans-serif" font-size="12" fill="#e67700">💡 提示：決議日期唔可以早過轉讓書日期！</text>
  <rect x="100" y="370" width="250" height="60" rx="4" fill="#fff" stroke="#1B2A4A" stroke-width="2" stroke-dasharray="6,3"/>
  <text x="225" y="395" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#1B2A4A">📝 董事簽署</text>
  <text x="225" y="415" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#868e96">（範例佔位）</text>
  <text x="400" y="480" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#868e96">📌 即使得一個董事，都要做呢份文件</text>
</svg>
