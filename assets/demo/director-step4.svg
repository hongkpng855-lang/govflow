<svg xmlns="http://www.w3.org/2000/svg" width="400" height="500" viewBox="0 0 400 500">
  <rect width="400" height="500" fill="#f8f6f0" rx="8"/>
  <rect x="20" y="20" width="360" height="460" rx="6" fill="none" stroke="#C9A84C" stroke-width="1.5" stroke-dasharray="5,5"/>
  <text x="200" y="60" text-anchor="middle" font-family="system-ui" font-size="13" font-weight="700" fill="#1B2A4A">SCR 變更記錄（董事變更）</text>
  <line x1="60" y1="80" x2="340" y2="80" stroke="#C9A84C" stroke-width="1"/>
  <text x="60" y="110" font-family="system-ui" font-size="11" fill="#666">公司名稱：ABC Limited</text>
  <text x="60" y="140" font-family="system-ui" font-size="11" fill="#555">董事變更日期：[日期]</text>
  <text x="60" y="170" font-family="system-ui" font-size="11" fill="#555">董事變更詳情：[辭任/委任]</text>
  <text x="60" y="205" font-family="system-ui" font-size="11" font-weight="600" fill="#1B2A4A">SCR 影響評估：</text>
  <text x="75" y="230" font-family="system-ui" font-size="11" fill="#555">☐ 影響持股超過 25% → 需更新 SCR</text>
  <text x="75" y="255" font-family="system-ui" font-size="11" fill="#555">☑ 不影響控制權 → 無需更新</text>
  <text x="60" y="295" font-family="system-ui" font-size="11" fill="#666">SCR 更新日期（如有）：________</text>
  <text x="60" y="330" font-family="system-ui" font-size="11" fill="#666">更新執行人：________</text>
  <rect x="60" y="360" width="280" height="30" rx="4" fill="#fff3e0"/>
  <text x="200" y="380" text-anchor="middle" font-family="system-ui" font-size="10" fill="#e65100">⚠️ 影響控制權需在 7 天內更新 SCR</text>
</svg>
