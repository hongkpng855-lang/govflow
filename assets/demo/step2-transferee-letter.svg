<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" font-family="'Noto Sans TC','Microsoft JhengHei',sans-serif">
  <rect width="800" height="600" fill="#FAFAFA"/>
  <rect x="30" y="20" width="740" height="560" fill="white" stroke="#CCC" stroke-width="1" rx="4"/>
  <!-- Header -->
  <rect x="30" y="20" width="740" height="60" fill="#1B2A4A" rx="4"/>
  <text x="400" y="58" text-anchor="middle" fill="#C9A84C" font-size="18" font-weight="bold">承讓人確認信 Letter of Transferee</text>
  <!-- To -->
  <text x="50" y="110" fill="#1B2A4A" font-size="13" font-weight="bold">致：ABC 貿易有限公司 董事會</text>
  <text x="50" y="135" fill="#666" font-size="11">公司編號：1234567</text>
  <!-- Body -->
  <text x="50" y="165" fill="#333" font-size="12">本人，<tspan fill="#1B2A4A" font-weight="bold">李小欣 Siu Yan Li</tspan>（香港身份證：Y1234567），</text>
  <text x="50" y="188" fill="#333" font-size="12">地址：香港北角英皇道 250 號北角城中心 8/F 806 室，</text>
  <text x="50" y="218" fill="#333" font-size="12">茲確認同意接收以下股份：</text>
  <!-- Table -->
  <rect x="50" y="240" width="700" height="80" fill="#F8F9FA" stroke="#DDD" stroke-width="1" rx="3"/>
  <text x="60" y="262" fill="#1B2A4A" font-size="12" font-weight="bold">轉讓人（Transferor）</text>
  <text x="320" y="262" fill="#1B2A4A" font-size="12" font-weight="bold">股份類別</text>
  <text x="480" y="262" fill="#1B2A4A" font-size="12" font-weight="bold">股數</text>
  <text x="580" y="262" fill="#1B2A4A" font-size="12" font-weight="bold">每股作價</text>
  <line x1="50" y1="270" x2="750" y2="270" stroke="#DDD" stroke-width="1"/>
  <text x="60" y="295" fill="#333" font-size="12">陳大明（Tai Ming Chan）</text>
  <text x="320" y="295" fill="#333" font-size="12">普通股</text>
  <text x="480" y="295" fill="#333" font-size="12">5,000</text>
  <text x="580" y="295" fill="#333" font-size="12">HK$10.00</text>
  <!-- Agreement -->
  <rect x="50" y="335" width="700" height="80" fill="#FFF8E7" stroke="#C9A84C" stroke-width="1" rx="3"/>
  <text x="60" y="358" fill="#1B2A4A" font-size="12" font-weight="bold">確認事項</text>
  <text x="60" y="378" fill="#333" font-size="11">✅ 本人同意受公司組織章程細則（Articles of Association）約束</text>
  <text x="60" y="396" fill="#333" font-size="11">✅ 本人同意將姓名加入公司股東名冊</text>
  <text x="60" y="414" fill="#333" font-size="11">✅ 本人確認已閱讀並理解股份轉讓條款</text>
  <!-- Signature -->
  <rect x="50" y="430" width="700" height="70" fill="#F8F9FA" stroke="#E0E0E0" stroke-width="1" rx="3"/>
  <text x="60" y="455" fill="#333" font-size="12">承讓人簽署：<tspan fill="#C9A84C" font-style="italic">李小欣</tspan></text>
  <text x="400" y="455" fill="#333" font-size="12">日期：2026-06-01</text>
  <text x="60" y="480" fill="#666" font-size="11">見證人簽署：<tspan fill="#C9A84C" font-style="italic">張偉明</tspan>（會計師 · 牌照號碼：CP12345）</text>
  <!-- Footer -->
  <text x="680" y="570" fill="#CCC" font-size="10" text-anchor="end">示範範例 · ESGov</text>
</svg>
