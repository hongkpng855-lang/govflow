<svg xmlns="http://www.w3.org/2000/svg" width="400" height="500" viewBox="0 0 400 500">
  <rect width="400" height="500" fill="#f8f6f0" rx="8"/>
  <rect x="20" y="20" width="360" height="460" rx="6" fill="none" stroke="#C9A84C" stroke-width="1.5" stroke-dasharray="5,5"/>
  <text x="200" y="60" text-anchor="middle" font-family="system-ui" font-size="13" font-weight="700" fill="#1B2A4A">董事委任書</text>
  <line x1="60" y1="80" x2="340" y2="80" stroke="#C9A84C" stroke-width="1"/>
  <text x="60" y="115" font-family="system-ui" font-size="11" fill="#666">ABC Limited 董事會決議</text>
  <text x="60" y="150" font-family="system-ui" font-size="11" fill="#555">經董事會決議通過，委任 [姓名] 為本公司董事。</text>
  <text x="60" y="180" font-family="system-ui" font-size="11" fill="#555">委任生效日期：[日期]</text>
  <text x="60" y="215" font-family="system-ui" font-size="11" fill="#555">候選人已確認符合董事資格：</text>
  <text x="75" y="240" font-family="system-ui" font-size="11" fill="#555">☑ 年滿 18 歲</text>
  <text x="75" y="260" font-family="system-ui" font-size="11" fill="#555">☑ 未被取消董事資格</text>
  <text x="75" y="280" font-family="system-ui" font-size="11" fill="#555">☑ 同意出任董事</text>
  <text x="60" y="330" font-family="system-ui" font-size="11" fill="#666">董事會代表簽署：</text>
  <line x1="60" y1="360" x2="250" y2="360" stroke="#333" stroke-width="1"/>
  <text x="60" y="380" font-family="system-ui" font-size="10" fill="#999">公司秘書/董事</text>
</svg>
