<svg xmlns="http://www.w3.org/2000/svg" width="800" height="600" viewBox="0 0 800 600">
  <rect width="800" height="600" fill="#f8f9fa"/>
  <rect x="40" y="30" width="720" height="540" rx="8" fill="#fff" stroke="#dee2e6" stroke-width="1"/>
  <text x="400" y="80" text-anchor="middle" font-family="sans-serif" font-size="18" font-weight="bold" fill="#1B2A4A">股份轉讓書 (Instrument of Transfer) — 填寫範例</text>
  <line x1="100" y1="100" x2="700" y2="100" stroke="#C9A84C" stroke-width="2"/>
  <text x="100" y="140" font-family="sans-serif" font-size="13" fill="#495057">轉讓人 (Transferor):</text>
  <rect x="300" y="120" width="380" height="28" rx="4" fill="#fff" stroke="#1B2A4A" stroke-width="1.5"/>
  <text x="310" y="139" font-family="sans-serif" font-size="13" fill="#212529">ABC Trading Limited</text>
  <text x="100" y="180" font-family="sans-serif" font-size="13" fill="#495057">承讓人 (Transferee):</text>
  <rect x="300" y="160" width="380" height="28" rx="4" fill="#fff" stroke="#1B2A4A" stroke-width="1.5"/>
  <text x="310" y="179" font-family="sans-serif" font-size="13" fill="#212529">John Doe</text>
  <text x="100" y="220" font-family="sans-serif" font-size="13" fill="#495057">轉讓股數:</text>
  <rect x="300" y="200" width="120" height="28" rx="4" fill="#fff" stroke="#1B2A4A" stroke-width="1.5"/>
  <text x="310" y="219" font-family="sans-serif" font-size="13" fill="#212529">100 股</text>
  <text x="100" y="260" font-family="sans-serif" font-size="13" fill="#495057">每股作價:</text>
  <rect x="300" y="240" width="120" height="28" rx="4" fill="#fff" stroke="#1B2A4A" stroke-width="1.5"/>
  <text x="310" y="259" font-family="sans-serif" font-size="13" fill="#212529">HK$10.00</text>
  <text x="100" y="300" font-family="sans-serif" font-size="13" fill="#495057">總代價:</text>
  <rect x="300" y="280" width="120" height="28" rx="4" fill="#fff" stroke="#1B2A4A" stroke-width="1.5"/>
  <text x="310" y="299" font-family="sans-serif" font-size="13" fill="#212529">HK$1,000</text>
  <text x="100" y="340" font-family="sans-serif" font-size="13" fill="#495057">簽署日期:</text>
  <rect x="300" y="320" width="160" height="28" rx="4" fill="#fff" stroke="#1B2A4A" stroke-width="1.5"/>
  <text x="310" y="339" font-family="sans-serif" font-size="13" fill="#212529">2025-06-01</text>
  <rect x="100" y="400" width="250" height="60" rx="4" fill="#fff" stroke="#e67700" stroke-width="2" stroke-dasharray="6,3"/>
  <text x="225" y="425" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#e67700">⚠️ 轉讓人簽署</text>
  <text x="225" y="445" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#e67700">（此處為範例，請勿直接使用）</text>
  <rect x="450" y="400" width="250" height="60" rx="4" fill="#fff" stroke="#e67700" stroke-width="2" stroke-dasharray="6,3"/>
  <text x="575" y="425" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#e67700">⚠️ 承讓人簽署</text>
  <text x="575" y="445" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#e67700">（此處為範例，請勿直接使用）</text>
  <text x="400" y="520" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#868e96">📌 注意：公司名必須同商業登記證完全一致</text>
</svg>
