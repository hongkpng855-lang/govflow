<svg xmlns="http://www.w3.org/2000/svg" width="800" height="500" viewBox="0 0 800 500">
  <rect width="800" height="500" fill="#f8f9fa"/>
  <rect x="40" y="30" width="720" height="440" rx="8" fill="#fff" stroke="#dee2e6" stroke-width="1"/>
  <text x="400" y="75" text-anchor="middle" font-family="sans-serif" font-size="18" font-weight="bold" fill="#1B2A4A">銀行戶口更新信 — 範例</text>
  <line x1="100" y1="95" x2="700" y2="95" stroke="#C9A84C" stroke-width="2"/>
  <text x="100" y="140" font-family="sans-serif" font-size="13" font-weight="bold" fill="#1B2A4A">致：</text>
  <text x="180" y="140" font-family="sans-serif" font-size="13" fill="#212529">香港銀行有限公司</text>
  <text x="100" y="170" font-family="sans-serif" font-size="13" font-weight="bold" fill="#1B2A4A">公司名稱：</text>
  <text x="220" y="170" font-family="sans-serif" font-size="13" fill="#212529">ABC Trading Limited</text>
  <text x="100" y="200" font-family="sans-serif" font-size="13" font-weight="bold" fill="#1B2A4A">戶口號碼：</text>
  <text x="220" y="200" font-family="sans-serif" font-size="13" fill="#212529">012-345-6789</text>
  <text x="100" y="240" font-family="sans-serif" font-size="13" fill="#212529">茲通知 貴行，本公司股東已發生變更。舊股東 ABC Trading Limited</text>
  <text x="100" y="265" font-family="sans-serif" font-size="13" fill="#212529">已將其全部持股轉讓予新股東 John Doe。請更新相關戶口簽署人</text>
  <text x="100" y="290" font-family="sans-serif" font-size="13" fill="#212529">權限，舊股東即日起不再具有簽署權限。</text>
  <rect x="100" y="320" width="580" height="40" rx="4" fill="#fff4e6" stroke="#e67700" stroke-width="1"/>
  <text x="110" y="345" font-family="sans-serif" font-size="12" fill="#e67700">⚠️ 我仲未做銀行更新，呢步唔可以拖 — 舊股東仲有權簽支票！</text>
  <text x="400" y="440" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#868e96">📌 銀行紀錄、商業登記、政府牌照都要更新</text>
</svg>
