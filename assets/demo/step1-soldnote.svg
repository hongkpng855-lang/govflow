  <rect x="50" y="235" width="700" height="90" fill="#F8F9FA" stroke="#E0E0E0" stroke-width="1" rx="3"/>
  <text x="60" y="260" fill="#1B2A4A" font-size="13" font-weight="bold">買方資料（Transferee）</text>
  <text x="60" y="283" fill="#333" font-size="12">姓名/公司名稱：李小欣 Siu Yan Li</text>
