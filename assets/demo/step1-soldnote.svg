  <text x="60" y="178" fill="#333" font-size="12">姓名/公司名稱：陳大明 Tai Ming Chan</text>
  <text x="60" y="198" fill="#333" font-size="12">地址：九龍觀塘開源道 72 號溢財中心 12/F 1208 室</text>
