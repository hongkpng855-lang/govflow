<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 620" font-family="'Noto Sans TC','Microsoft JhengHei',sans-serif">
  <rect width="800" height="620" fill="#FAFAFA"/>
  <rect x="30" y="20" width="740" height="580" fill="white" stroke="#CCC" stroke-width="1" rx="4"/>
  <!-- Header -->
  <rect x="30" y="20" width="740" height="60" fill="#1B2A4A" rx="4"/>
  <text x="400" y="48" text-anchor="middle" fill="#C9A84C" font-size="18" font-weight="bold">股份配發申請書 NSC1</text>
  <text x="400" y="68" text-anchor="middle" fill="#AAA" font-size="10">公司註冊處表格 · 公司（清盤及雜項條文）條例</text>

  <!-- Company Info -->
  <rect x="50" y="95" width="700" height="90" fill="#F0F4FF" stroke="#B0C4DE" stroke-width="1" rx="3"/>
  <text x="60" y="117" fill="#1B2A4A" font-size="12" font-weight="bold">公司名稱：ABC 貿易有限公司</text>
  <text x="60" y="138" fill="#333" font-size="12">公司編號：1234567</text>
  <text x="60" y="158" fill="#333" font-size="12">註冊辦事處：九龍觀塘開源道 72 號溢財中心 12/F 1208 室</text>
  <text x="60" y="178" fill="#333" font-size="12">提交日期：2025 年 9 月 15 日</text>

  <!-- Allotment Details -->
  <rect x="50" y="200" width="700" height="120" fill="#FFF8E7" stroke="#C9A84C" stroke-width="1" rx="3"/>
  <text x="60" y="223" fill="#1B2A4A" font-size="12" font-weight="bold">股本增加詳情</text>
  <line x1="60" y1="230" x2="740" y2="230" stroke="#C9A84C" stroke-width="0.5"/>
  <text x="60" y="250" fill="#333" font-size="12">增加前法定股本：HK$ 100,000（分為 100,000 股 每股 HK$ 1.00）</text>
  <text x="60" y="270" fill="#333" font-size="12">增加後法定股本：HK$ 1,000,000（分為 1,000,000 股 每股 HK$ 1.00）</text>
  <text x="60" y="290" fill="#333" font-size="12">本次配發股份數目：50,000 股</text>
  <text x="60" y="310" fill="#333" font-size="12">配發每股作價：HK$ 1.00　｜　總代價：HK$ 50,000</text>

  <!-- Allottee -->
  <rect x="50" y="335" width="700" height="80" fill="#F8F9FA" stroke="#DDD" stroke-width="1" rx="3"/>
  <text x="60" y="358" fill="#1B2A4A" font-size="12" font-weight="bold">獲配發人資料</text>
  <text x="60" y="380" fill="#333" font-size="12">姓名：李小欣</text>
  <text x="60" y="400" fill="#333" font-size="12">地址：九龍紅磡海逸豪園 5 座 20/F A 室</text>

  <!-- Declaration -->
  <rect x="50" y="430" width="700" height="55" fill="#E8F5E9" stroke="#A5D6A7" stroke-width="1" rx="3"/>
  <text x="60" y="453" fill="#1B2A4A" font-size="12" font-weight="bold">董事聲明</text>
  <text x="60" y="473" fill="#333" font-size="11">本人確認上述配發股份已獲董事會決議批准，及相關款項已妥為收妥。</text>

  <!-- Signature -->
  <rect x="50" y="500" width="700" height="40" fill="#F8F9FA" stroke="#DDD" stroke-width="1" rx="3"/>
  <text x="60" y="523" fill="#333" font-size="12">董事簽署：<tspan fill="#C9A84C" font-style="italic">陳大明</tspan>　　日期：2025-09-15</text>

  <!-- Stamp -->
  <rect x="50" y="555" width="700" height="30" fill="#FFF3E0" stroke="#FFB74D" stroke-width="1" rx="3"/>
  <text x="60" y="574" fill="#E65100" font-size="11">📌 重要：NSC1 必須係已遞交公司註冊處嘅正式申報版本，唔可以用 draft</text>

  <!-- Footer -->
  <text x="680" y="605" fill="#CCC" font-size="10" text-anchor="end">示範範例 · ESGov</text>

  <!-- Watermarks -->
  <text x="50" y="80" transform="rotate(-25,50,80)" font-size="28" fill="rgba(0,0,0,0.08)" font-weight="bold" font-family="Arial">ESGov</text>
  <text x="120" y="220" transform="rotate(-25,120,220)" font-size="28" fill="rgba(0,0,0,0.08)" font-weight="bold" font-family="Arial">ESGov</text>
  <text x="50" y="360" transform="rotate(-25,50,360)" font-size="28" fill="rgba(0,0,0,0.08)" font-weight="bold" font-family="Arial">ESGov</text>
</svg>
