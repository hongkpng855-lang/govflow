<svg xmlns="http://www.w3.org/2000/svg" width="400" height="500" viewBox="0 0 400 500">
  <rect width="400" height="500" fill="#f8f6f0" rx="8"/>
  <rect x="20" y="20" width="360" height="460" rx="6" fill="none" stroke="#C9A84C" stroke-width="1.5" stroke-dasharray="5,5"/>
  <text x="200" y="60" text-anchor="middle" font-family="system-ui" font-size="13" font-weight="700" fill="#1B2A4A">重要控制人識別通知書</text>
  <line x1="60" y1="80" x2="340" y2="80" stroke="#C9A84C" stroke-width="1"/>
  <text x="60" y="115" font-family="system-ui" font-size="11" fill="#666">致：[姓名/公司名稱]</text>
  <text x="60" y="150" font-family="system-ui" font-size="11" fill="#555">根據《公司條例》第 653 條，本公司正在識別</text>
  <text x="60" y="175" font-family="system-ui" font-size="11" fill="#555">重要控制人。經初步審查，你/貴公司可能</text>
  <text x="60" y="200" font-family="system-ui" font-size="11" fill="#555">符合以下條件之一：</text>
  <text x="75" y="230" font-family="system-ui" font-size="11" fill="#555">☐ 持有公司 25% 以上股份</text>
  <text x="75" y="255" font-family="system-ui" font-size="11" fill="#555">☐ 持有公司 25% 以上表決權</text>
  <text x="75" y="280" font-family="system-ui" font-size="11" fill="#555">☐ 有權委任/罷免過半數董事</text>
  <text x="60" y="320" font-family="system-ui" font-size="11" fill="#555">請提供以下資料：姓名、通訊地址、</text>
  <text x="60" y="345" font-family="system-ui" font-size="11" fill="#555">身份證明文件號碼及控制性質。</text>
  <text x="60" y="385" font-family="system-ui" font-size="11" fill="#666">請於 [日期] 前回覆。</text>
</svg>
