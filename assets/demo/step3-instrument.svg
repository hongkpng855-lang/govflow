<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 620" font-family="'Noto Sans TC','Microsoft JhengHei',sans-serif">
  <rect width="800" height="620" fill="#FAFAFA"/>
  <rect x="30" y="20" width="740" height="580" fill="white" stroke="#CCC" stroke-width="1" rx="4"/>
  <!-- Header -->
  <rect x="30" y="20" width="740" height="65" fill="#1B2A4A" rx="4"/>
  <text x="400" y="48" text-anchor="middle" fill="#C9A84C" font-size="18" font-weight="bold">股份轉讓書 Instrument of Transfer</text>
  <text x="400" y="70" text-anchor="middle" fill="#AAA" font-size="11">依據公司條例第 66 條</text>
  <!-- Company Info -->
  <rect x="50" y="100" width="700" height="55" fill="#F0F4FF" stroke="#B0C4DE" stroke-width="1" rx="3"/>
  <text x="60" y="122" fill="#1B2A4A" font-size="12" font-weight="bold">公司名稱：ABC 貿易有限公司</text>
  <text x="60" y="142" fill="#666" font-size="11">公司編號：1234567 ｜ 商業登記證號碼：12345678-000</text>
  <!-- Transferor -->
  <rect x="50" y="170" width="700" height="70" fill="#F8F9FA" stroke="#DDD" stroke-width="1" rx="3"/>
  <text x="60" y="192" fill="#1B2A4A" font-size="12" font-weight="bold">轉讓人（Transferor）</text>
  <text x="60" y="212" fill="#333" font-size="12">陳大明（Tai Ming Chan）</text>
  <text x="60" y="230" fill="#666" font-size="11">地址：九龍觀塘開源道 72 號溢財中心 12/F 1208 室</text>
  <!-- Transferee -->
  <rect x="50" y="255" width="700" height="70" fill="#F8F9FA" stroke="#DDD" stroke-width="1" rx="3"/>
  <text x="60" y="277" fill="#1B2A4A" font-size="12" font-weight="bold">承讓人（Transferee）</text>
  <text x="60" y="297" fill="#333" font-size="12">李小欣（Siu Yan Li）</text>
  <text x="60" y="315" fill="#666" font-size="11">地址：香港北角英皇道 250 號北角城中心 8/F 806 室</text>
  <!-- Share Details -->
  <rect x="50" y="340" width="700" height="85" fill="#FFF8E7" stroke="#C9A84C" stroke-width="1" rx="3"/>
  <text x="60" y="362" fill="#1B2A4A" font-size="12" font-weight="bold">股份詳情</text>
  <text x="60" y="385" fill="#333" font-size="12">股份類別：普通股 Ordinary Shares ｜ 每股面值：HK$ 1.00</text>
  <text x="60" y="405" fill="#333" font-size="12">轉讓股數：<tspan fill="#C0392B" font-weight="bold">5,000 股</tspan>（佔已發行股本 50%）</text>
  <text x="60" y="420" fill="#C0392B" font-size="12" font-weight="bold">總代價：HK$ 50,000.00（港幣五萬元整）</text>
  <!-- Signatures -->
  <rect x="50" y="440" width="700" height="75" fill="#F8F9FA" stroke="#DDD" stroke-width="1" rx="3"/>
  <text x="60" y="463" fill="#333" font-size="12">轉讓人簽署：<tspan fill="#C9A84C" font-style="italic">陳大明</tspan> 　　日期：2026-06-01</text>
  <text x="400" y="463" fill="#333" font-size="12">承讓人簽署：<tspan fill="#C9A84C" font-style="italic">李小欣</tspan> 　　日期：2026-06-01</text>
  <text x="60" y="488" fill="#666" font-size="11">見證人簽署：<tspan fill="#C9A84C" font-style="italic">張偉明</tspan> 　　職業：會計師 　　身份證：Z9876543</text>
  <!-- Stamp Duty -->
  <rect x="50" y="530" width="700" height="40" fill="#E8F5E9" stroke="#A5D6A7" stroke-width="1" rx="3"/>
  <text x="60" y="553" fill="#2E7D32" font-size="11">印花稅欄（由稅務局蓋印）　　應繳稅額：HK$ 100.00（0.2%）　　繳交日期：______</text>
  <!-- Footer -->
  <text x="680" y="605" fill="#CCC" font-size="10" text-anchor="end">示範範例 · GovFlow</text>
</svg>
