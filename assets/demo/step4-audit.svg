<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" font-family="'Noto Sans TC','Microsoft JhengHei',sans-serif">
  <rect width="800" height="600" fill="#FAFAFA"/>
  <rect x="30" y="20" width="740" height="560" fill="white" stroke="#CCC" stroke-width="1" rx="4"/>
  <!-- Header -->
  <rect x="30" y="20" width="740" height="60" fill="#1B2A4A" rx="4"/>
  <text x="400" y="50" text-anchor="middle" fill="#C9A84C" font-size="18" font-weight="bold">審計報告 Audit Report</text>
  <text x="400" y="68" text-anchor="middle" fill="#AAA" font-size="10">截至 2026 年 3 月 31 日止年度</text>
  <!-- Firm Info -->
  <rect x="50" y="95" width="700" height="45" fill="#F0F4FF" stroke="#B0C4DE" stroke-width="1" rx="3"/>
  <text x="60" y="117" fill="#1B2A4A" font-size="12" font-weight="bold">核數師：陳張會計師事務所有限公司</text>
  <text x="60" y="132" fill="#666" font-size="11">執業牌照：PN123456 ｜ 香港灣仔告士打道 50 號 18/F</text>
  <!-- Company -->
  <text x="60" y="165" fill="#333" font-size="12">致：ABC 貿易有限公司 董事會</text>
  <text x="60" y="188" fill="#333" font-size="12">本公司已完成審計 ABC 貿易有限公司截至 2026 年 3 月 31 日止年度之財務報表。</text>
  <!-- Balance Sheet Summary -->
  <rect x="50" y="210" width="700" height="130" fill="#FFF8E7" stroke="#C9A84C" stroke-width="1" rx="3"/>
  <text x="60" y="233" fill="#1B2A4A" font-size="12" font-weight="bold">資產負債表摘要</text>
  <text x="60" y="258" fill="#333" font-size="12">非流動資產：　　　　　　HK$ 1,200,000</text>
  <text x="60" y="278" fill="#333" font-size="12">流動資產：　　　　　　　HK$   850,000</text>
  <line x1="60" y1="288" x2="350" y2="288" stroke="#DDD" stroke-width="1"/>
  <text x="60" y="305" fill="#1B2A4A" font-size="12" font-weight="bold">資產總額：　　　　　　　HK$ 2,050,000</text>
  <text x="60" y="325" fill="#333" font-size="12">減：負債總額：　　　　　HK$ (350,000)</text>
  <line x1="60" y1="335" x2="350" y2="335" stroke="#C9A84C" stroke-width="2"/>
  <text x="60" y="350" fill="#C0392B" font-size="12" font-weight="bold">資產淨值：　　　　　　　HK$ 1,700,000</text>
  <!-- Opinion -->
  <rect x="50" y="355" width="700" height="70" fill="#E8F5E9" stroke="#A5D6A7" stroke-width="1" rx="3"/>
  <text x="60" y="378" fill="#2E7D32" font-size="12" font-weight="bold">核數意見：無保留意見（Unqualified Opinion）</text>
  <text x="60" y="398" fill="#555" font-size="11">本會計師認為，該財務報表真實而公平地反映 貴公司於 2026 年 3 月 31 日之財務狀況。</text>
  <text x="60" y="418" fill="#555" font-size="11">每股資產淨值：HK$ 17.00（按 100,000 股已發行股份計算）</text>
  <!-- Signatures -->
  <rect x="50" y="440" width="700" height="55" fill="#F8F9FA" stroke="#E0E0E0" stroke-width="1" rx="3"/>
  <text x="60" y="463" fill="#333" font-size="12">簽署：<tspan fill="#C9A84C" font-style="italic">張志強</tspan>（執業會計師）　　日期：2026-04-15</text>
  <text x="400" y="463" fill="#333" font-size="12">簽署：<tspan fill="#C9A84C" font-style="italic">陳美玲</tspan>（執業會計師）　　日期：2026-04-15</text>
  <text x="680" y="585" fill="#CCC" font-size="10" text-anchor="end">示範範例 · ESGov</text>
</svg>
