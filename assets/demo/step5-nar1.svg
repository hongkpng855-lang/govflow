<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 620" font-family="'Noto Sans TC','Microsoft JhengHei',sans-serif">
  <rect width="800" height="620" fill="#FAFAFA"/>
  <rect x="30" y="20" width="740" height="580" fill="white" stroke="#CCC" stroke-width="1" rx="4"/>
  <!-- Header -->
  <rect x="30" y="20" width="740" height="60" fill="#1B2A4A" rx="4"/>
  <text x="400" y="48" text-anchor="middle" fill="#C9A84C" font-size="18" font-weight="bold">周年申報表 NAR1</text>
  <text x="400" y="68" text-anchor="middle" fill="#AAA" font-size="10">公司註冊處表格 · 公司條例第 662 條</text>
  <!-- Company Info -->
  <rect x="50" y="95" width="700" height="90" fill="#F0F4FF" stroke="#B0C4DE" stroke-width="1" rx="3"/>
  <text x="60" y="117" fill="#1B2A4A" font-size="12" font-weight="bold">公司名稱：ABC 貿易有限公司</text>
  <text x="60" y="138" fill="#333" font-size="12">公司編號：1234567</text>
  <text x="60" y="158" fill="#333" font-size="12">註冊辦事處：九龍觀塘開源道 72 號溢財中心 12/F 1208 室</text>
  <text x="60" y="178" fill="#333" font-size="12">申報截至日期：2026 年 6 月 30 日</text>
  <!-- Capital Structure -->
  <rect x="50" y="200" width="700" height="80" fill="#FFF8E7" stroke="#C9A84C" stroke-width="1" rx="3"/>
  <text x="60" y="223" fill="#1B2A4A" font-size="12" font-weight="bold">股本結構</text>
  <text x="60" y="248" fill="#333" font-size="12">法定股本：HK$ 1,000,000（分為 1,000,000 股 每股 HK$ 1.00）</text>
  <text x="60" y="268" fill="#333" font-size="12">已發行股本：HK$ 100,000（100,000 股）</text>
  <!-- Shareholders after transfer -->
  <rect x="50" y="295" width="700" height="80" fill="#F8F9FA" stroke="#DDD" stroke-width="1" rx="3"/>
  <text x="60" y="318" fill="#1B2A4A" font-size="12" font-weight="bold">股東名冊（股份轉讓後）</text>
  <text x="60" y="340" fill="#333" font-size="12">陳大明：5,000 股（5%）<tspan fill="#C0392B" font-size="11"> （轉讓前 50% → 轉讓後 5%）</tspan></text>
  <text x="60" y="360" fill="#333" font-size="12">李小欣：5,000 股（5%）<tspan fill="#2E7D32" font-size="11"> （新股東 · 本次轉讓取得）</tspan></text>
  <text x="400" y="360" fill="#333" font-size="12">其他股東：90,000 股（90%）</text>
  <!-- Directors & Secretary -->
  <rect x="50" y="390" width="700" height="60" fill="#F8F9FA" stroke="#DDD" stroke-width="1" rx="3"/>
  <text x="60" y="412" fill="#1B2A4A" font-size="12" font-weight="bold">董事及公司秘書</text>
  <text x="60" y="435" fill="#333" font-size="12">董事：陳大明 ｜ 公司秘書：李志強（卓智秘書有限公司）</text>
  <!-- Signature -->
  <rect x="50" y="465" width="700" height="50" fill="#E8F5E9" stroke="#A5D6A7" stroke-width="1" rx="3"/>
  <text x="60" y="488" fill="#333" font-size="12">董事簽署：<tspan fill="#C9A84C" font-style="italic">陳大明</tspan>　　日期：2026-06-15</text>
  <text x="400" y="488" fill="#666" font-size="11">提交方式：網上提交 eCR</text>
  <!-- Fee -->
  <rect x="50" y="530" width="700" height="35" fill="#FFF3E0" stroke="#FFB74D" stroke-width="1" rx="3"/>
  <text x="60" y="552" fill="#E65100" font-size="11">登記費：HK$ 105 ｜ 逾期登記費（42 日後）：HK$ 870 ｜ 請按時提交</text>
  <!-- Footer -->
  <text x="680" y="605" fill="#CCC" font-size="10" text-anchor="end">示範範例 · ESGov</text>
<text x="50" y="80" transform="rotate(-25,50,80)" font-size="28" fill="rgba(0,0,0,0.08)" font-weight="bold" font-family="Arial">ESGov</text>
<text x="120" y="220" transform="rotate(-25,120,220)" font-size="28" fill="rgba(0,0,0,0.08)" font-weight="bold" font-family="Arial">ESGov</text>
<text x="50" y="360" transform="rotate(-25,50,360)" font-size="28" fill="rgba(0,0,0,0.08)" font-weight="bold" font-family="Arial">ESGov</text>
</svg>
